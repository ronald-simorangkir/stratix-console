/* ---------- Agen Analis Keuangan ---------- */
function AgentFinance({ d, caseCtx, onGenerateReview, onRerun, rerunning, analyzedAt, versioning }) {
  const { Card, CardHeader, StatCard, DataTable, Badge, Alert, Tabs, Select, Button } = AgNS;
  const [tab, setTab] = React.useState("ringkasan");
  React.useEffect(refreshIcons);
  const statusBadge = (s) => <Badge tone={s === "Baik" ? "positive" : "warning"} size="sm">{s}</Badge>;
  const company = (caseCtx && caseCtx.company) || "Perusahaan";
  const concernLabel = { negative: "Tinggi", warning: "Sedang", info: "Perhatian" };

  // ---- Periode keuangan ----
  const years = d.revenueLabels;
  const revScale = Math.max(...((d.revenueSeries && d.revenueSeries.length) ? d.revenueSeries : [0])) >= 1000 ? 1000 : 1; // normalisasi Miliar -> Triliun bila AI kembalikan skala miliar
  const revSeries = (d.revenueSeries || []).map((v) => v / revScale);
  const [fromIdx, setFromIdx] = React.useState(0);
  const [toIdx, setToIdx] = React.useState(years.length - 1);
  const lo = Math.min(fromIdx, toIdx), hi = Math.max(fromIdx, toIdx);
  const nYears = hi - lo + 1;
  const multi = nYears > 1;
  const startYear = years[lo], endYear = years[hi];
  const rangeLabel = multi ? `${startYear}–${endYear}` : endYear;
  const revSlice = revSeries.slice(lo, hi + 1);
  const marginSlice = d.marginSeries.slice(lo, hi + 1);
  const labelSlice = years.slice(lo, hi + 1);
  const nums = (v, dg = 1) => (v >= 0 ? "+" : "") + v.toFixed(dg).replace(".", ",");
  const revNow = revSeries[hi], revPrev = revSeries[hi - 1];
  const revDelta = hi > 0 ? ((revNow - revPrev) / revPrev) * 100 : null;
  const marNow = d.marginSeries[hi], marDelta = hi > 0 ? (marNow - d.marginSeries[hi - 1]) : null;
  const cagr = multi ? (Math.pow(revNow / revSeries[lo], 1 / (hi - lo)) - 1) * 100 : null;
  const fmtT = (v) => v.toFixed(2).replace(".", ",");
  const revStart = revSeries[lo], marStart = d.marginSeries[lo], marEnd = d.marginSeries[hi];
  const ulasanLead = multi
    ? `Ulasan ini mencakup periode ${startYear}–${endYear} (${nYears} tahun). Sepanjang periode tersebut, pendapatan bergerak dari Rp ${fmtT(revStart)} T menjadi Rp ${fmtT(revNow)} T (CAGR ${cagr.toFixed(1).replace(".", ",")}%), dengan marjin EBITDA ${marStart.toFixed(1).replace(".", ",")}% menuju ${marEnd.toFixed(1).replace(".", ",")}%.`
    : `Ulasan ini difokuskan pada tahun buku ${endYear}, dengan pendapatan Rp ${fmtT(revNow)} T dan marjin EBITDA ${marEnd.toFixed(1).replace(".", ",")}%.`;
  const fin = d.financials || null;
  const finVal = (key, idx) => (fin && fin.lines && fin.lines[key] && idx >= 0 && fin.lines[key][idx] != null && !isNaN(fin.lines[key][idx])) ? +fin.lines[key][idx] : null;
  const finCapex = (idx) => (fin && Array.isArray(fin.capex) && fin.capex[idx] != null && !isNaN(fin.capex[idx])) ? +fin.capex[idx] : null;
  const rpCard = (v) => (v == null || isNaN(v)) ? { value: "n.a.", unit: "M" } : (Math.abs(v) >= 1000 ? { value: "Rp " + (v / 1000).toFixed(2).replace(".", ","), unit: "T" } : { value: "Rp " + Math.round(v).toLocaleString("id-ID"), unit: "M" });
  const kpis = d.kpis.map((k, i) => {
    if (i === 0) return { ...k, label: `Revenue FY${endYear}`, value: "Rp " + revNow.toFixed(2).replace(".", ","), unit: "T", delta: revDelta != null ? nums(revDelta) + "%" : "—", hint: multi ? `vs ${years[hi - 1]}` : "YoY" };
    if (i === 1) return { ...k, label: `EBITDA Margin ${endYear}`, value: marNow.toFixed(1).replace(".", ","), unit: "%", delta: marDelta != null ? nums(marDelta) + "%" : "—", hint: hi > 0 ? `vs ${years[hi - 1]}` : "—" };
    if (i === 2) {
      const np = finVal("laba_bersih", hi), npp = finVal("laba_bersih", hi - 1), c = rpCard(np);
      if (np != null) return { ...k, label: `Net Profit FY${endYear}`, value: c.value, unit: c.unit, delta: (npp != null && npp !== 0) ? nums((np - npp) / Math.abs(npp) * 100) + "%" : (String(k.delta || "").length <= 10 ? k.delta : ""), hint: hi > 0 ? `vs ${years[hi - 1]}` : `FY${endYear}` };
      return { ...k, label: `Net Profit FY${endYear}`, hint: (k.hint && String(k.hint).length > 18) ? "YoY" : k.hint };
    }
    if (i === 3) {
      const cfo = finVal("kas_operasi", hi), cap = finCapex(hi);
      if (cfo != null && cap != null) {
        const fcf = cfo - cap, c = rpCard(fcf);
        const formula = `Free Cash Flow (FY${endYear})\n\nRumus umum:\nFCF = Kas Bersih Aktivitas Operasi \u2212 Capex\n\n= ${fmtChartNum(cfo, "Rp M")} \u2212 ${fmtChartNum(cap, "Rp M")}\n= ${fmtChartNum(fcf, "Rp M")} (Miliar Rupiah)\n\nCapex = belanja modal (pembelian aset tetap) dari arus kas investasi.`;
        return { ...k, label: `Free Cash Flow FY${endYear}`, value: c.value, unit: c.unit, delta: "", hint: "hover: rumus", title: formula };
      }
      return { ...k, label: `Free Cash Flow FY${endYear}`, value: "n.a.", unit: "M", delta: "", hint: "data kurang", title: `FCF tidak dapat dihitung untuk FY${endYear}: komponen Kas Bersih Operasi dan/atau Capex tidak tersedia di dokumen. Unggah laporan arus kas yang lengkap.` };
    }
    return k;
  });
  const setFrom = (v) => { setFromIdx(v); if (v > toIdx) setToIdx(v); };
  const setTo = (v) => { setToIdx(v); if (v < fromIdx) setFromIdx(v); };
  const applyPreset = (n) => { const t = years.length - 1; setToIdx(t); setFromIdx(Math.max(0, t - (n - 1))); };
  const yearOpts = years.map((y, i) => ({ value: String(i), label: y }));
  const periodKey = multi ? `${startYear}-${endYear}` : String(endYear);
  const periodLabelFull = multi ? `Tahun Buku ${startYear}–${endYear}` : `Tahun Buku ${endYear}`;
  const isFullRange = lo === 0 && hi === years.length - 1;
  const cachedReview = (d.reviewsByPeriod && d.reviewsByPeriod[periodKey]) || (isFullRange && d.review) || null;
  const onExportPDF = () => printFinanceReport({
    company, caseId: caseCtx && caseCtx.id, periodLabel: periodLabelFull,
    kpis, ratios: d.ratios, verdict: d.verdict,
    review: cachedReview || d.review, reviewMeta: d.reviewMeta, concerns: d.concerns,
  });
  const [revBusy, setRevBusy] = React.useState(false);
  const [revErr, setRevErr] = React.useState("");
  const hasDocs = !!(caseCtx && (caseCtx.docText || []).length > 0);
  const genReview = () => {
    if (!onGenerateReview) return;
    setRevErr(""); setRevBusy(true);
    Promise.resolve(onGenerateReview(periodLabelFull, periodKey))
      .then(() => setRevBusy(false))
      .catch((e) => { setRevErr((e && e.message) || String(e)); setRevBusy(false); });
  };

  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 20, maxWidth: 1760, margin: "0 auto", alignItems: "flex-start" }}>
      <div style={{ flex: "1 1 680px", minWidth: 0 }}>
      <ResultToolbar version="v3" versioning={versioning} onExport={onExportPDF} onRerun={onRerun} rerunning={rerunning} when={analyzedAt} />
      <div style={{ marginBottom: 22 }}>
        <Tabs value={tab} onChange={setTab} items={[
          { value: "ringkasan", label: "Ringkasan", icon: <Icon n="layout-dashboard" s={15} /> },
          { value: "ulasan", label: "Ulasan Lengkap", icon: <Icon n="file-text" s={15} /> },
          { value: "redflags", label: "Red Flags & Concern", icon: <Icon n="alert-triangle" s={15} /> },
        ]} />
      </div>

      {/* Pemilih periode keuangan — berlaku untuk ketiga bagian */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap", marginBottom: 20, padding: "12px 16px", background: "var(--surface)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)" }}>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 7, fontSize: 12, fontWeight: 700, letterSpacing: "0.04em", textTransform: "uppercase", color: "var(--text-muted)" }}><Icon n="calendar-range" s={15} /> Periode Keuangan</span>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 12, color: "var(--text-faint)" }}>Dari</span>
          <div style={{ width: 92 }}><Select value={String(fromIdx)} onChange={(e) => setFrom(+e.target.value)} options={yearOpts} /></div>
          <span style={{ fontSize: 12, color: "var(--text-faint)" }}>sampai</span>
          <div style={{ width: 92 }}><Select value={String(toIdx)} onChange={(e) => setTo(+e.target.value)} options={yearOpts} /></div>
        </div>
        <Badge tone={multi ? "accent" : "neutral"} dot>{nYears} tahun</Badge>
        <div style={{ flex: 1 }} />
        <div style={{ display: "flex", gap: 6 }}>
          {[["1 Thn", 1], ["3 Thn", 3], ["5 Thn", 5]].map(([lbl, n]) => (
            <button key={lbl} onClick={() => applyPreset(n)} style={{ height: 30, padding: "0 12px", borderRadius: "var(--radius-sm)", border: "1px solid var(--border-strong)", background: nYears === n ? "var(--accent-quiet)" : "var(--surface)", color: nYears === n ? "var(--accent-hover)" : "var(--text-muted)", fontSize: 12.5, fontWeight: 600, cursor: "pointer", fontFamily: "var(--font-sans)" }}>{lbl}</button>

        <div>
          <Alert tone="warning" title="Catatan analitis, bukan indikasi fraud" style={{ marginBottom: 18 }}>

/* ---------- Agen Risiko & Fraud ---------- */
function ScoreBlock({ kind, s }) {
  const { Badge } = AgNS;
  React.useEffect(refreshIcons);
  const SCORE_CFG = {
    mscore: { title: "Beneish M-Score", min: -3.5, max: 0.5, zones: [[-2.22, "var(--positive-500)", "Bersih"], [-1.78, "var(--warning-500)", "Abu-abu"], [0.5, "var(--negative-500)", "Manipulasi"]], fmt: (v) => Number(v).toFixed(2).replace(".", ","), ticks: [["-2,22", -2.22], ["-1,78", -1.78]] },
    dechow: { title: "Dechow F-Score", min: 0, max: 3, zones: [[1.0, "var(--positive-500)", "Normal"], [2.45, "var(--warning-500)", "Substansial"], [3, "var(--negative-500)", "Risiko tinggi"]], fmt: (v) => Number(v).toFixed(2).replace(".", ","), ticks: [["1,00", 1.0], ["2,45", 2.45]] },
    altman: { title: "Altman Z-Score", min: 0, max: 5, zones: [[1.81, "var(--negative-500)", "Distress"], [2.99, "var(--warning-500)", "Abu-abu"], [5, "var(--positive-500)", "Aman"]], fmt: (v) => Number(v).toFixed(2).replace(".", ","), ticks: [["1,81", 1.81], ["2,99", 2.99]] },
    fscore: { title: "Piotroski F-Score", min: 0, max: 9, zones: [[3, "var(--negative-500)", "Lemah"], [6, "var(--warning-500)", "Sedang"], [9, "var(--positive-500)", "Kuat"]], fmt: (v) => v + " / 9", ticks: [["3", 3], ["6", 6]] },
  };
  const cfg = SCORE_CFG[kind] || SCORE_CFG.mscore;
  if (!s || s.value == null) {
    return <div style={{ border: "1px dashed var(--border-strong)", borderRadius: "var(--radius-md)", padding: "12px 14px", fontSize: 12, color: "var(--text-muted)" }}>{cfg.title} belum tersedia — jalankan <b>Analisis ulang</b> agar dihitung dari laporan keuangan.</div>;
  }
  const num = Number(s.value);
  const vd = String(s.verdict || "").toLowerCase();
  const tone = /manipulasi|lemah|distress|tinggi/.test(vd) ? "negative" : /abu|sedang|substansial/.test(vd) ? "warning" : "positive";
  const isBinary = kind === "fscore" || (Array.isArray(s.components) && s.components[0] && s.components[0].point != null);
  const comps = (s.components || []).map((c) => isBinary
    ? "\u2022 [" + (c.point ? "1" : "0") + "] " + c.k + (c.note ? " \u2014 " + c.note : "")
    : "\u2022 " + c.k + (c.label ? " (" + c.label + ")" : "") + ": " + (c.value != null ? c.value : "\u2014") + (c.note ? " \u2014 " + c.note : "")).join("\n");
  const tip = cfg.title + " \u2014 Tahun " + (s.year || "-") + "\n\nRUMUS:\n" + (s.formula || "-") + "\n\nKOMPONEN:\n" + comps;
  const span = cfg.max - cfg.min;
  const pct = (x) => Math.max(0, Math.min(100, ((x - cfg.min) / span) * 100));
  let prev = cfg.min;
  const segs = cfg.zones.map(([to, color, label]) => { const w = pct(to) - pct(prev); prev = to; return { w, color, label }; });
  return (
    <div style={{ border: "1px solid var(--border)", borderRadius: "var(--radius-md)", padding: "13px 15px", background: "var(--bg-subtle)" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, flexWrap: "wrap" }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: "var(--text-strong)" }}>{cfg.title}</div>
          <div style={{ fontSize: 10.5, color: "var(--text-faint)" }}>Tahun {s.year || "-"}</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 20, fontWeight: 800, color: "var(--text-strong)" }}>{cfg.fmt(s.value)}</span>
          <Badge tone={tone} dot>{s.verdict}</Badge>
          <button title={tip} style={{ border: "1px solid var(--border)", background: "var(--surface)", color: "var(--text-muted)", borderRadius: 999, width: 24, height: 24, cursor: "help", display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon n="info" s={13} /></button>
        </div>
      </div>
      <div style={{ marginTop: 12 }}>
        <div style={{ position: "relative", height: 8 }}>
          <div style={{ position: "absolute", inset: 0, borderRadius: 5, overflow: "hidden", display: "flex" }}>
            {segs.map((sg, i) => <div key={i} style={{ width: sg.w + "%", background: sg.color, opacity: 0.85 }} />)}
          </div>
          <div style={{ position: "absolute", top: -3, bottom: -3, left: pct(num) + "%", width: 2, background: "var(--text-strong)", transform: "translateX(-1px)", borderRadius: 2 }} />
        </div>
        <div style={{ position: "relative", height: 13, marginTop: 3, fontSize: 9.5, color: "var(--text-faint)", fontFamily: "var(--font-mono)" }}>
          {cfg.ticks.map(([lbl, val], i) => <span key={i} style={{ position: "absolute", left: pct(val) + "%", transform: "translateX(-50%)" }}>{lbl}</span>)}
        </div>
        <div style={{ display: "flex", fontSize: 9, color: "var(--text-faint)" }}>
          {segs.map((sg, i) => <span key={i} style={{ flexGrow: sg.w, flexBasis: 0, textAlign: "center" }}>{sg.label}</span>)}
        </div>
      </div>
      {s.interpretation ? <div style={{ fontSize: 12, color: "var(--text-body)", lineHeight: 1.6, marginTop: 9 }}>{s.interpretation}</div> : null}
    </div>
  );
}

function AgentRisk({ d, caseCtx, onRerun, rerunning, analyzedAt, versioning }) {
  const { Card, CardHeader, Badge, Alert, RiskBadge, RiskCell } = AgNS;
  React.useEffect(refreshIcons);
  const company = (caseCtx && caseCtx.company) || "Perusahaan";
  const rowLabels = ["Katastropik", "Besar", "Sedang", "Kecil", "Minor"];
  const colLabels = ["Jarang", "Kecil", "Mungkin", "Sering", "Hampir pasti"];
  const levelOrder = [["critical", "Kritis"], ["high", "Tinggi"], ["moderate", "Sedang"], ["low", "Rendah"]];
  const flags = d.flags || [];
  const [cell, setCell] = React.useState(null);
  const counts = levelOrder.map(([lv, lbl]) => [lbl, flags.filter((f) => f.level === lv).length, lv]).filter(([, n]) => n > 0);
  // Pemetaan flag BERNOMOR ke sel matriks (impact=baris, likelihood=kolom)
  const cellNums = {};
  flags.forEach((f, i) => {
    if (f.impact && f.likelihood) {
      const ri = 5 - Math.min(5, Math.max(1, f.impact));
      const ci = Math.min(5, Math.max(1, f.likelihood)) - 1;
      const k = ri + "-" + ci;
      (cellNums[k] = cellNums[k] || []).push(i + 1);
    }
  });
  const shown = cell ? d.flags.map((f, i) => ({ f: f, i: i })).filter(function (o) {
    if (!o.f.impact || !o.f.likelihood) return false;
    const ri = 5 - Math.min(5, Math.max(1, o.f.impact));
    const ci = Math.min(5, Math.max(1, o.f.likelihood)) - 1;
    return (ri + "-" + ci) === cell;
  }) : d.flags.map((f, i) => ({ f: f, i: i }));
  const cellInfo = cell ? { imp: 5 - Number(cell.split("-")[0]), lik: Number(cell.split("-")[1]) + 1 } : null;
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 20, maxWidth: 1760, margin: "0 auto", alignItems: "flex-start" }}>
      <div style={{ flex: "1 1 680px", minWidth: 0 }}>
      <ResultToolbar version="v2" versioning={versioning} onExport={() => printRiskReport(d, caseCtx)} onRerun={onRerun} rerunning={rerunning} when={analyzedAt} />
      <div style={{ display: "grid", gridTemplateColumns: "minmax(0, 1fr) minmax(0, 1.1fr)", gap: 16, marginBottom: 20 }}>
        <Card>
          <CardHeader title="Indeks Risiko Fraud" subtitle="Komposit dari 4 dimensi temuan" action={<RiskBadge level={d.level} />} />
          <div style={{ display: "flex", alignItems: "center", gap: 22 }}>
            <Donut value={d.score} label="/100" color="var(--risk-high)" track="var(--bg-subtle)" size={116} />
            <div style={{ display: "flex", flexDirection: "column", gap: 8, flex: 1 }}>
              {counts.map(([l, n, lv]) => (
                <div key={l} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", fontSize: 13 }}>
                  <span style={{ display: "inline-flex", alignItems: "center", gap: 8, color: "var(--text-body)" }}><span style={{ width: 8, height: 8, borderRadius: 2, background: `var(--risk-${lv})` }} />{l}</span>
                  <span style={{ fontFamily: "var(--font-mono)", fontWeight: 600, color: "var(--text-strong)" }}>{n} temuan</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{ marginTop: 16, borderTop: "1px solid var(--border-subtle)", paddingTop: 14, display: "flex", flexDirection: "column", gap: 14 }}>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {d.mscore ? <Badge tone={/manipulasi/i.test(d.mscore.verdict || "") ? "negative" : /abu/i.test(d.mscore.verdict || "") ? "warning" : "positive"} dot>M-Score: {d.mscore.verdict}</Badge> : null}
              {d.fscore ? <Badge tone={/lemah/i.test(d.fscore.verdict || "") ? "negative" : /sedang/i.test(d.fscore.verdict || "") ? "warning" : "positive"} dot>F-Score: {d.fscore.value}/9 ({d.fscore.verdict})</Badge> : null}
            </div>
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 6 }}>Ringkasan Temuan</div>
              <div style={{ fontSize: 13, color: "var(--text-body)", lineHeight: 1.7 }}>{d.summary || `Teridentifikasi ${(d.flags || []).length} temuan dengan komposit risiko ${d.level || "sedang"}. Perhatian utama terpusat pada ${(d.flags || []).slice(0, 3).map((f) => f.area).filter(Boolean).join(", ") || "beberapa area keuangan"}. Skor forensik: M-Score ${d.mscore ? d.mscore.verdict : "-"}, F-Score ${d.fscore ? d.fscore.value + "/9" : "-"}.`}</div>
            </div>
            {d.recommendation ? <div>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 6 }}>Rekomendasi Tindak Lanjut</div>
              <div style={{ fontSize: 13, color: "var(--text-body)", lineHeight: 1.7, borderLeft: "3px solid var(--risk-high)", paddingLeft: 12 }}>{d.recommendation}</div>
            </div> : null}
            <div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 9 }}>
                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: "var(--text-muted)" }}>Matriks Risiko · Dampak × Kemungkinan</div>
                {cell ? <button onClick={() => setCell(null)} style={{ border: "none", background: "transparent", cursor: "pointer", fontSize: 11.5, fontWeight: 700, color: "var(--accent-hover)" }}>Tampilkan semua</button> : null}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <div style={{ writingMode: "vertical-rl", transform: "rotate(180deg)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 800, letterSpacing: "0.14em", textTransform: "uppercase", color: "var(--text-muted)", flexShrink: 0 }}>Dampak →</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 9, fontWeight: 800, letterSpacing: "0.14em", textTransform: "uppercase", color: "var(--text-muted)", textAlign: "center", marginBottom: 4, paddingLeft: 46 }}>Kemungkinan →</div>
                  <table style={{ borderCollapse: "separate", borderSpacing: 3, width: "100%", tableLayout: "fixed" }}>
                <thead>
                  <tr>
                    <th style={{ width: 46 }}></th>
                    {colLabels.map((cl, c) => (
                      <th key={c} style={{ fontSize: 8.5, fontWeight: 700, color: "var(--text-faint)", textAlign: "center", padding: "0 0 4px", lineHeight: 1.1 }}>{cl}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {rowLabels.map((rl, r) => (
                    <tr key={r}>
                      <td style={{ fontSize: 8.5, fontWeight: 700, color: "var(--text-faint)", textAlign: "right", paddingRight: 5, lineHeight: 1.05 }}>{rl}</td>
                      {colLabels.map((_, c) => {
                        const key = r + "-" + c;
                        const n = (cellNums[key] || []).length;
                        const imp = 5 - r, lik = c + 1, sev = imp * lik;
                        const rgb = sev >= 15 ? "239,68,68" : sev >= 10 ? "249,115,22" : sev >= 5 ? "245,158,11" : "34,197,94";
                        const active = cell === key;
                        return (
                          <td key={c} style={{ padding: 0 }}>
                            <button disabled={n === 0} onClick={() => setCell(active ? null : key)} title={"Dampak " + imp + " × Kemungkinan " + lik + (n ? " — " + n + " temuan" : "")}
                              style={{ width: "100%", height: 34, border: active ? "2px solid var(--text-strong)" : "1px solid rgba(" + rgb + ",0.4)", background: "rgba(" + rgb + "," + (n ? 0.92 : 0.12) + ")", borderRadius: 6, cursor: n ? "pointer" : "default", color: n ? "#fff" : "transparent", fontWeight: 800, fontSize: 13, fontFamily: "var(--font-mono)", opacity: (cell && !active && n) ? 0.45 : 1, transition: "opacity var(--dur-fast)" }}>
                              {n || 0}
                            </button>
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
                  </table>
                </div>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 8.5, color: "var(--text-faint)", marginTop: 3, paddingLeft: 49 }}>
                <span>← Kemungkinan lebih rendah</span><span>lebih tinggi →</span>
              </div>
              <div style={{ fontSize: 10.5, color: "var(--text-faint)", marginTop: 8, lineHeight: 1.5 }}>Angka pada tiap kotak = <b>jumlah temuan red flags</b>. Klik kotak untuk menyaring daftar temuan; klik lagi untuk melepas filter.</div>
            </div>
          </div>
        </Card>
        <Card>
          <CardHeader title="Skor Forensik Laporan Keuangan" subtitle="Empat model · tahun terakhir" />
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div>
              <div style={{ display: "inline-flex", alignItems: "center", gap: 7, fontSize: 11, fontWeight: 800, letterSpacing: "0.04em", textTransform: "uppercase", color: "var(--negative-600)" }}><Icon n="alert-triangle" s={13} /> 1 · Potensi Manipulasi</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 9 }}>
                <ScoreBlock kind="mscore" s={d.mscore} />
                <ScoreBlock kind="dechow" s={d.dechow} />
              </div>
            </div>
            <div>
              <div style={{ display: "inline-flex", alignItems: "center", gap: 7, fontSize: 11, fontWeight: 800, letterSpacing: "0.04em", textTransform: "uppercase", color: "var(--positive-600)" }}><Icon n="heart-pulse" s={13} /> 2 · Kesehatan Keuangan</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 9 }}>
                <ScoreBlock kind="altman" s={d.altman} />
                <ScoreBlock kind="fscore" s={d.fscore} />
              </div>
            </div>
          </div>
        </Card>
      </div>

      <SectionTitle eyebrow="Temuan" title="Red Flags & Indikasi Fraud" right={cell ? <Badge tone="warning" dot>{shown.length} dari {d.flags.length} · terfilter</Badge> : <Badge tone="negative" dot>{d.flags.length} temuan aktif</Badge>} />
      {cell ? <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12, background: "var(--accent-quiet)", border: "1px solid var(--teal-400)", borderRadius: "var(--radius-md)", padding: "8px 12px" }}>
        <Icon n="filter" s={14} style={{ color: "var(--accent-hover)" }} />
        <span style={{ fontSize: 12.5, color: "var(--text-body)", flex: 1 }}>Menampilkan temuan pada kotak <b>Dampak {cellInfo.imp} × Kemungkinan {cellInfo.lik}</b>.</span>
        <button onClick={() => setCell(null)} style={{ border: "none", background: "transparent", cursor: "pointer", fontSize: 12.5, fontWeight: 700, color: "var(--accent-hover)" }}>Tampilkan semua</button>
      </div> : null}
      <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 20 }}>
        {shown.map(({ f, i }) => (
          <Card key={i} padding="md" style={{ borderLeft: `3px solid var(--risk-${f.level})` }}>
            <div style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
              <div style={{ width: 32, height: 32, borderRadius: "50%", background: `var(--risk-${f.level})`, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 14, fontWeight: 800 }}>{i + 1}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 15, fontWeight: 700, color: "var(--text-strong)" }}>{f.title}</span>

                  {f.modus && <Badge tone="negative" size="sm">{f.modus}</Badge>}

                </div>
                <p style={{ fontSize: 13.5, color: "var(--text-body)", marginTop: 8, lineHeight: 1.6 }}>{f.detail}</p>
                {f.modusDetail && (<div style={{ marginTop: 8, fontSize: 13, color: "var(--text-body)", lineHeight: 1.55 }}><span style={{ fontWeight: 700, color: `var(--risk-${f.level})` }}>Kemungkinan modus: </span>{f.modusDetail}</div>)}
                {f.evidence && (
                  <div style={{ marginTop: 10, padding: "10px 12px", background: "var(--bg-subtle)", borderRadius: "var(--radius-md)", borderLeft: "2px solid var(--border-strong)" }}>
                    <div style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.06em", color: "var(--text-faint)", fontWeight: 700, marginBottom: 3 }}>Bukti dari dokumen</div>
                    <div style={{ fontSize: 13, color: "var(--text-body)", lineHeight: 1.55 }}>{f.evidence}</div>
                  </div>
                )}
                {f.implication && (
                  <p style={{ marginTop: 8, fontSize: 13, color: "var(--text-muted)", lineHeight: 1.55 }}>
                    <span style={{ fontWeight: 700, color: "var(--negative-600)" }}>Implikasi: </span>{f.implication}
                  </p>
                )}
                {f.action && (
                  <div style={{ marginTop: 10, padding: "11px 13px", background: `var(--risk-${f.level}-050)`, border: `1px solid var(--risk-${f.level})`, borderRadius: "var(--radius-md)", display: "flex", gap: 9, alignItems: "flex-start" }}>
                    <span style={{ color: `var(--risk-${f.level})`, flexShrink: 0, marginTop: 1 }}><Icon n="arrow-right" s={16} /></span>
                    <div><div style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", fontWeight: 800, color: `var(--risk-${f.level})` }}>Tindak lanjut</div><div style={{ fontSize: 13, color: "var(--text-strong)", fontWeight: 600, lineHeight: 1.55, marginTop: 2 }}>{f.action}</div></div>
                  </div>
                )}
              </div>
            </div>
          </Card>
        ))}
      </div>
      </div>
      <ChatDock>
        <ChatPanel caseId={caseCtx && caseCtx.id} caseName={company} agentKey="risk" agentLabel="Agen Risiko & Fraud" period="Analisis terkini" contextText={caseCtx && window.STX_AI.buildContext(caseCtx.docText, 160000)} />
      </ChatDock>
    </div>
  );
}

function cannedReply(q, period) {
  const ql = q.toLowerCase();
  let core;
  if (/utang|leverage|der|solvab/.test(ql)) core = "rasio utang (DER) berada di 1,12× — sedikit di atas benchmark 1,00×. Tren peningkatan leverage perlu dipantau terhadap kovenan pinjaman.";

  else if (/persediaan|inventor|modal kerja/.test(ql)) core = "perputaran persediaan 5,4× masih di bawah benchmark 6,0×, mengindikasikan modal kerja yang menahan kas.";

function EksporPanel() {
  const { Card, CardHeader, Button, Alert } = SetNS;
  const [busy, setBusy] = React.useState(false);
  const fileRef = React.useRef(null);
  React.useEffect(refreshIcons);
  const exportData = async () => {
    setBusy(true);
    try {
      const cases = (window.STX_STORE ? await window.STX_STORE.loadCases() : null) || [];
      const payload = { app: "STRATIX", schema: 1, exportedAt: new Date().toISOString(), count: cases.length, cases: cases };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = "stratix-backup-" + new Date().toISOString().slice(0, 10) + ".json"; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    } catch (e) { alert("Gagal ekspor: " + ((e && e.message) || e)); }
    setBusy(false);
  };
  const onFile = (e) => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const obj = JSON.parse(r.result);
        const cases = Array.isArray(obj) ? obj : (obj && Array.isArray(obj.cases) ? obj.cases : null);
        if (!cases) throw new Error("Format berkas tidak dikenali.");
        if (!confirm("Impor " + cases.length + " case? Ini akan menggantikan data lokal saat ini.")) return;
        window.STX_STORE.saveCases(cases).then(() => location.reload());
      } catch (err) { alert("Gagal impor: " + err.message); }
    };
    r.readAsText(f);
  };
  const clearData = () => {
    if (!confirm("Hapus SEMUA case & hasil analisis dari perangkat ini? Tindakan ini permanen.")) return;
    if (window.STX_STORE) window.STX_STORE.saveCases([]).then(() => location.reload());
  };
  return (
    <div>
      <SectionTitle eyebrow="Data" title="Ekspor & Cadangan" />
      <Card padding="lg" style={{ marginBottom: 16 }}>
        <CardHeader title="Cadangan Data Lokal" subtitle="Seluruh case & hasil analisis tersimpan di perangkat ini" />
        <div style={{ fontSize: 13, color: "var(--text-body)", lineHeight: 1.6, marginBottom: 16 }}>
          Ekspor seluruh data (case, dokumen, hasil analisis) ke satu berkas JSON sebagai cadangan atau untuk dipindahkan ke perangkat lain. Impor akan menggantikan data lokal saat ini.
        </div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <Button variant="primary" iconLeft={<Icon n="download" s={15} />} onClick={exportData} disabled={busy}>{busy ? "Menyiapkan\u2026" : "Ekspor Cadangan (JSON)"}</Button>
          <Button variant="secondary" iconLeft={<Icon n="upload" s={15} />} onClick={() => fileRef.current && fileRef.current.click()}>Impor Cadangan</Button>
          <input ref={fileRef} type="file" accept="application/json,.json" onChange={onFile} style={{ display: "none" }} />
        </div>
      </Card>
      <Card padding="lg">
        <CardHeader title="Bersihkan Data" subtitle="Hapus seluruh data lokal dari perangkat ini" />
        <div style={{ marginBottom: 14 }}><Alert tone="warning" title="Tindakan permanen">Menghapus semua case & hasil analisis dari penyimpanan perangkat ini. Pastikan sudah mengekspor cadangan bila diperlukan.</Alert></div>
        <Button variant="secondary" iconLeft={<Icon n="trash-2" s={15} />} onClick={clearData}>Hapus Semua Data Lokal</Button>
      </Card>
    </div>
  );
}

<script type="text/babel">
const NS = window.STRATIXDesignSystem_72cbdd;

function App() {
  const D = window.STX_DATA;
  const [theme, setTheme] = React.useState("light");
  const [view, setView] = React.useState(() => {
    try {
      const q = new URLSearchParams(location.search);
      if (q.get("new")) return "newcase";
      if (q.get("app")) return "library";
      return "landing";
    } catch (e) { return "landing"; }
  });
  const [cases, setCases] = React.useState(D.cases);
  const [openCases, setOpenCases] = React.useState([]);
  const [activeCaseId, setActiveCaseId] = React.useState(null);
  const [settingsTab, setSettingsTab] = React.useState("ai");
  const [dirtyIds, setDirtyIds] = React.useState({});
  const [pendingClose, setPendingClose] = React.useState(null);
  const [pendingDelete, setPendingDelete] = React.useState(null);
  const [jobs, setJobs] = React.useState({});
  const jobTimers = React.useRef({});
  const { Button, IconButton, Badge, Dialog } = NS;
  const activeCase = openCases.find((c) => c.id === activeCaseId) || null;

  // ---- Background analysis jobs (survive navigation) ----
  const jobKey = (caseId, agent) => caseId + ":" + agent;
  const setJob = (key, patch) => setJobs((j) => ({ ...j, [key]: Object.assign({}, j[key], patch) }));
  const buildPriorFindings = (c) => {
    const a = c.analysis || {}, parts = [];
    const f = a.finance;
    if (f) {
      if (f.verdict) parts.push("KESIMPULAN KEUANGAN: " + f.verdict);
      if (Array.isArray(f.concerns) && f.concerns.length) parts.push("CONCERN KEUANGAN:\n" + f.concerns.map((x) => `- ${x.title}${x.detail ? ": " + x.detail : ""}`).join("\n"));
      if (Array.isArray(f.ratios) && f.ratios.length) parts.push("RASIO KUNCI: " + f.ratios.map((r) => `${r.r} ${r.v} (${r.s})`).join("; "));
    }
    const r = a.risk;
    if (r) {
      if (Array.isArray(r.flags) && r.flags.length) parts.push("RED FLAGS RISIKO/FRAUD:\n" + r.flags.map((x) => `- [${x.level}] ${x.title}${x.detail ? ": " + x.detail : ""}`).join("\n"));
      if (r.mscore) parts.push(`Beneish M-Score ${r.mscore.year || ""}: ${r.mscore.value} (${r.mscore.verdict})`);
      if (r.fscore) parts.push(`Piotroski F-Score ${r.fscore.year || ""}: ${r.fscore.value}/9 (${r.fscore.verdict})`);
    }
    return parts.join("\n\n").slice(0, 8000);
  };
  const startJob = (caseObj, agent) => {
    const key = jobKey(caseObj.id, agent);
    if (jobs[key] && jobs[key].status === "running") return;
    const AI = window.STX_AI;
    const ctx = window.STX_AI.buildContext(caseObj.docText);
    if (agent === "finance" || agent === "risk" || agent === "transform") {
      if (!AI || !AI.hasKey()) { setJob(key, { status: "error", error: "API Key Anthropic belum diatur. Buka Pengaturan → API Key.", progress: 0 }); return; }
      if (ctx.trim().length < 40) { setJob(key, { status: "error", error: "Unggah dokumen keuangan terlebih dahulu agar dapat dianalisis.", progress: 0 }); return; }
    }
    setJob(key, { status: "running", progress: 10, error: "" });
    clearInterval(jobTimers.current[key]);
    jobTimers.current[key] = setInterval(() => {
      setJobs((j) => { const cur = j[key] || {}; if (cur.status !== "running") return j; return { ...j, [key]: Object.assign({}, cur, { progress: Math.min(92, (cur.progress || 10) + 3) }) }; });
    }, 500);
    const finish = (patch) => { clearInterval(jobTimers.current[key]); setJob(key, patch); };
    if (agent === "finance" && AI) {
      AI.analyzeFinance({ company: caseObj.company, contextText: ctx })
        .then((result) => {
          result.analyzedAt = new Date().toLocaleString("id-ID", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
          { const _prev = caseObj.analysis && caseObj.analysis.finance; let _ha = (caseObj.history && caseObj.history.finance) || []; if (!_ha.length && _prev) _ha = [_prev]; caseObj.history = Object.assign({}, caseObj.history, { finance: _ha.concat([result]) }); }
          caseObj.analysis = Object.assign({}, caseObj.analysis, { finance: result });
          if (!caseObj.agents.includes("finance")) caseObj.agents.push("finance");
          markDirty(caseObj.id);
          finish({ status: "done", progress: 100 });
        })
        .catch((e) => finish({ status: "error", progress: 0, error: "Analisis gagal: " + e.message }));
    } else if (agent === "risk" && AI) {
      AI.analyzeRisk({ company: caseObj.company, contextText: ctx })
        .then((result) => {
          result.analyzedAt = new Date().toLocaleString("id-ID", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
          { const _prev = caseObj.analysis && caseObj.analysis.risk; let _ha = (caseObj.history && caseObj.history.risk) || []; if (!_ha.length && _prev) _ha = [_prev]; caseObj.history = Object.assign({}, caseObj.history, { risk: _ha.concat([result]) }); }
          caseObj.analysis = Object.assign({}, caseObj.analysis, { risk: result });
          if (!caseObj.agents.includes("risk")) caseObj.agents.push("risk");
          markDirty(caseObj.id);
          finish({ status: "done", progress: 100 });
        })
        .catch((e) => finish({ status: "error", progress: 0, error: "Analisis gagal: " + e.message }));
    } else if (agent === "transform" && AI) {
      const prior = buildPriorFindings(caseObj);
      AI.analyzeTransform({ company: caseObj.company, contextText: ctx, priorFindings: prior })
        .then((result) => {
          result.analyzedAt = new Date().toLocaleString("id-ID", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
          { const _prev = caseObj.analysis && caseObj.analysis.transform; let _ha = (caseObj.history && caseObj.history.transform) || []; if (!_ha.length && _prev) _ha = [_prev]; caseObj.history = Object.assign({}, caseObj.history, { transform: _ha.concat([result]) }); }
          caseObj.analysis = Object.assign({}, caseObj.analysis, { transform: result });
          if (!caseObj.agents.includes("transform")) caseObj.agents.push("transform");
          markDirty(caseObj.id);
          finish({ status: "done", progress: 100 });
        })
        .catch((e) => finish({ status: "error", progress: 0, error: "Analisis gagal: " + e.message }));
    } else {
      setTimeout(() => { if (!caseObj.agents.includes(agent)) caseObj.agents.push(agent); markDirty(caseObj.id); finish({ status: "done", progress: 100 }); }, 1500);
    }
  };
  const clearJob = (key) => setJobs((j) => { const n = { ...j }; delete n[key]; return n; });

  React.useEffect(() => { document.getElementById("root").setAttribute("data-theme", theme); }, [theme]);
  const [user, setUser] = React.useState(() => (window.STX_AUTH ? window.STX_AUTH.currentUser() : { name: "Tamu", email: "" }));
  const casesRef = React.useRef(cases);
  React.useEffect(() => { casesRef.current = cases; }, [cases]);
  const persist = React.useCallback(() => { if (window.STX_STORE) window.STX_STORE.saveCases(casesRef.current); }, []);
  React.useEffect(() => {
    if (!window.STX_STORE) return;
    window.STX_STORE.loadCases().then((saved) => { if (saved && Array.isArray(saved) && saved.length) { casesRef.current = saved; setCases(saved); } });
  }, []);

  const nextIndex = (() => {
    let max = 0;
    (cases || []).forEach((c) => { const m = /Case-(\d+)-/.exec(c.id || ""); if (m) max = Math.max(max, parseInt(m[1], 10)); });
    return max + 1;
  })();
  const openCase = (c) => {
    setOpenCases((prev) => (prev.some((x) => x.id === c.id) ? prev : [...prev, c]));
    setActiveCaseId(c.id); setView("workspace");
  };
  const markDirty = (id) => { setDirtyIds((p) => ({ ...p, [id]: true })); persist(); };
  const agentHist = (c, agent) => {
    const a = (c && c.analysis && c.analysis[agent]) || null;
    let arr = (c && c.history && c.history[agent]) || [];
    if ((!arr || !arr.length) && a) arr = [a];
    let idx = arr.length - 1;
    if (a) {
      const byRef = arr.indexOf(a);
      if (byRef >= 0) idx = byRef;
      else { const byStamp = arr.findIndex((x) => x && x.analyzedAt === a.analyzedAt); if (byStamp >= 0) idx = byStamp; }
    }
    return { arr: arr, idx: Math.max(0, idx) };
  };
  const selectVersion = (c, agent, i) => {
    const arr = (c && c.history && c.history[agent]) || [];
    if (!arr[i]) return;
    c.analysis = Object.assign({}, c.analysis, { [agent]: arr[i] });
    markDirty(c.id);
  };
  const vprops = (agent) => { const hh = agentHist(activeCase, agent); return { list: hh.arr, activeIndex: hh.idx, onSelect: (i) => selectVersion(activeCase, agent, i) }; };
  const saveCase = (id) => setDirtyIds((p) => ({ ...p, [id]: false }));
  const doClose = (id) => {
    setOpenCases((prev) => {
      const rest = prev.filter((c) => c.id !== id);
      if (id === activeCaseId) {
        if (rest.length) { setActiveCaseId(rest[rest.length - 1].id); setView("workspace"); }
        else { setActiveCaseId(null); setView("library"); }
      }
      return rest;
    });
    setDirtyIds((p) => { const n = { ...p }; delete n[id]; return n; });
  };
  const requestClose = (id) => { if (dirtyIds[id]) setPendingClose(id); else doClose(id); };
  const deleteCase = (id) => {
    const next = cases.filter((c) => c.id !== id);
    casesRef.current = next; setCases(next);
    setOpenCases((prev) => prev.filter((c) => c.id !== id));
    if (activeCaseId === id) { setActiveCaseId(null); setView("library"); }
    setDirtyIds((p) => { const n = { ...p }; delete n[id]; return n; });
    persist();
  };
  const selectCase = (id) => { setActiveCaseId(id); setView("workspace"); };
  const nav = (v) => setView(v);

  const Ic = ({ n, s = 16 }) => <Icon n={n} s={s} />;

  // Header config per view
  let title = "Pustaka Case", subtitle = `${cases.length} case tersimpan`, actions = null, onBack = null;
  if (view === "newcase") { title = "Case Baru"; subtitle = "Buat analisis perusahaan baru"; onBack = () => setView("library"); }
  else if (view === "workspace" && activeCase) { title = activeCase.name; subtitle = activeCase.id; }
  else if (view.startsWith("agent-") && activeCase) {
    const a = D.agents.find((x) => x.id === view.slice(6));
    title = a.name; subtitle = `${activeCase.company} · ${activeCase.id}`; onBack = () => setView("workspace");
  }
  else if (view === "settings") { title = "Pengaturan"; subtitle = "Model AI, akun & ekspor"; }
  else if (view === "library") { actions = <Button variant="primary" size="sm" iconLeft={<Ic n="plus" s={15} />} onClick={() => setView("newcase")}>Case Baru</Button>; }

  let content;
  if (view === "library") content = <CaseLibrary cases={cases} onOpen={openCase} onNew={() => setView("newcase")} onDelete={(c) => setPendingDelete(c)} />;
  else if (view === "newcase") content = <NewCaseFlow nextIndex={nextIndex} onCancel={() => setView("library")} onCreate={(c) => { const next = [c, ...cases]; casesRef.current = next; setCases(next); openCase(c); persist(); }} />;
  else if (view === "workspace" && activeCase) content = <CaseWorkspace caseCtx={activeCase} docs={D.documents} agents={D.agents} dirty={!!dirtyIds[activeCaseId]} jobs={jobs} onStartJob={startJob} onClearJob={clearJob} onMarkDirty={() => markDirty(activeCaseId)} onSave={() => saveCase(activeCaseId)} onRequestClose={() => requestClose(activeCaseId)} onRunAgent={(id) => { setView("agent-" + id); }} />;
  else if (view === "agent-finance" && activeCase) content = <AgentFinance d={(activeCase.analysis && activeCase.analysis.finance) || D.finance} caseCtx={activeCase} versioning={vprops("finance")} onRerun={() => startJob(activeCase, "finance")} rerunning={(jobs[jobKey(activeCaseId, "finance")] || {}).status === "running"} analyzedAt={activeCase.analysis && activeCase.analysis.finance && activeCase.analysis.finance.analyzedAt} onGenerateReview={(periodLabel, periodKey) => {
    const AI = window.STX_AI; const cObj = activeCase;
    const ctx = window.STX_AI.buildContext(cObj.docText);
    return AI.analyzeFinanceReview({ company: cObj.company, contextText: ctx, periodLabel }).then((review) => {
      const base = (cObj.analysis && cObj.analysis.finance) || (window.STX_DATA && window.STX_DATA.finance) || {}; const fin = Object.assign({}, base);
      fin.reviewsByPeriod = Object.assign({}, fin.reviewsByPeriod, { [periodKey]: review });
      cObj.analysis = Object.assign({}, cObj.analysis, { finance: fin });
      markDirty(cObj.id);
      return review;
    });
  }} />;
  else if (view === "agent-risk" && activeCase) content = <AgentRisk d={(activeCase.analysis && activeCase.analysis.risk) || D.risk} caseCtx={activeCase} versioning={vprops("risk")} onRerun={() => startJob(activeCase, "risk")} rerunning={(jobs[jobKey(activeCaseId, "risk")] || {}).status === "running"} analyzedAt={activeCase.analysis && activeCase.analysis.risk && activeCase.analysis.risk.analyzedAt} />;
  else if (view === "agent-transform" && activeCase) content = <AgentTransform d={(activeCase.analysis && activeCase.analysis.transform) || D.transform} caseCtx={activeCase} versioning={vprops("transform")} onRerun={() => startJob(activeCase, "transform")} rerunning={(jobs[jobKey(activeCaseId, "transform")] || {}).status === "running"} analyzedAt={activeCase.analysis && activeCase.analysis.transform && activeCase.analysis.transform.analyzedAt} />;
  else if (view === "settings") content = <Settings user={user} onUpdateUser={setUser} initialTab={settingsTab} />;
  else content = <CaseLibrary cases={cases} onOpen={openCase} onNew={() => setView("newcase")} onDelete={(c) => setPendingDelete(c)} />;

  if (!user) return <AuthScreen onAuth={setUser} />;
  if (view === "landing") {
    return <LandingScreen onContinue={() => setView("library")} onNew={() => setView("newcase")} user={user} onLogout={() => { if (window.STX_AUTH) window.STX_AUTH.logout(); setUser(null); setView("landing"); }} />;
  }

  const pc = pendingClose ? openCases.find((c) => c.id === pendingClose) : null;

  return (
    <React.Fragment>
      <AppShell active={view} onNav={nav} user={user} onOpenAccount={() => { setSettingsTab("akun"); setView("settings"); }}
        openCases={openCases} activeCaseId={activeCaseId} dirtyIds={dirtyIds} jobs={jobs}
        onSelectCase={selectCase} onCloseCase={requestClose}
        theme={theme} onToggleTheme={() => setTheme(theme === "light" ? "dark" : "light")}
        title={title} subtitle={subtitle} actions={actions} onBack={onBack}>
        {content}
      </AppShell>
      <Dialog open={!!pendingClose} onClose={() => setPendingClose(null)} title="Perubahan belum disimpan"
        description={pc ? `Case ${pc.id} memiliki perubahan yang belum disimpan. Apa yang ingin dilakukan?` : ""} width={460}
        footer={<React.Fragment>
          <Button variant="ghost" onClick={() => setPendingClose(null)}>Batal</Button>
          <Button variant="secondary" onClick={() => { const id = pendingClose; setPendingClose(null); doClose(id); }}>Tutup tanpa simpan</Button>
          <Button variant="primary" iconLeft={<Ic n="save" s={15} />} onClick={() => { const id = pendingClose; saveCase(id); setPendingClose(null); doClose(id); }}>Simpan &amp; tutup</Button>
        </React.Fragment>} />
      <Dialog open={!!pendingDelete} onClose={() => setPendingDelete(null)} title="Hapus case?"
        description={pendingDelete ? `${pendingDelete.company} · ${pendingDelete.id}` : ""} width={460}
        footer={<React.Fragment>
          <Button variant="ghost" onClick={() => setPendingDelete(null)}>Batal</Button>
          <Button variant="primary" iconLeft={<Ic n="trash-2" s={15} />} onClick={() => { const id = pendingDelete.id; setPendingDelete(null); deleteCase(id); }}>Hapus permanen</Button>
        </React.Fragment>}>
        <div style={{ fontSize: 14, color: "var(--text-body)", lineHeight: 1.6 }}>Case ini beserta seluruh dokumen dan hasil analisis yang tersimpan akan dihapus permanen dari perangkat ini. Tindakan ini tidak dapat dibatalkan.</div>
      </Dialog>
    </React.Fragment>
  );
}

const start = () => {
  if (!window.CaseLibrary || !window.AppShell || !window.Settings || !window.LandingScreen || !window.AuthScreen || !window.ChatPanel) return setTimeout(start, 30);
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
};
start();
</script>
</body>
</html>
