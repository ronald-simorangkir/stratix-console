        <p className="lp-lede">Satu ruang kerja untuk menilai keuangan, mengulas risiko &amp; fraud, dan menyusun rencana transformasi lima tahun — berdasarkan dokumen dan data.</p>

            <h3>Lanjutkan Case</h3>
            <p>Buka kembali analisis yang sudah ada di Pustaka Case Anda dan lanjutkan pekerjaan.</p>
            <div className="lp-meta">
              <span>Lanjutkan dari analisis terakhir Anda</span>

            <div className="lp-meta">
              <Icon n="sparkles" s={15} />

function AuthScreen({ onAuth }) {
  const [mode, setMode] = React.useState("login");
  const [name, setName] = React.useState("");
  const [email, setEmail] = React.useState("");
  const [pass, setPass] = React.useState("");
  const [err, setErr] = React.useState("");
  React.useEffect(() => {
    if (!document.getElementById("lp-style")) {
      const st = document.createElement("style"); st.id = "lp-style"; st.textContent = LP_CSS; document.head.appendChild(st);
    }
    refreshIcons();
  });
  const logo = (window.__resources && window.__resources.logoOnDark) || "./assets/stratix-logo-light.png";
  const submit = () => {
    setErr("");
    try {
      const A = window.STX_AUTH;
      const u = mode === "login" ? A.login(email, pass) : A.signup(name, email, pass);
      onAuth(u);
    } catch (e) { setErr((e && e.message) || String(e)); }
  };
  const inp = { width: "100%", height: 44, borderRadius: 10, border: "1px solid rgba(255,255,255,.16)", background: "rgba(255,255,255,.06)", color: "#fff", padding: "0 14px", fontSize: 14, fontFamily: "var(--font-sans)", outline: "none", marginBottom: 12, boxSizing: "border-box" };
  return (
    <div className="lp-stage" style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div className="lp-decor"><div className="lp-grid" /><div className="lp-bladeline" /></div>
      <div style={{ position: "relative", zIndex: 2, width: 420, maxWidth: "92vw", background: "rgba(10,22,44,.72)", backdropFilter: "blur(10px)", WebkitBackdropFilter: "blur(10px)", border: "1px solid rgba(255,255,255,.1)", borderRadius: 20, padding: "34px 30px", boxShadow: "0 24px 70px rgba(0,0,0,.42)" }}>
        <img src={logo} alt="STRATIX" style={{ height: 30, marginBottom: 22 }} />
        <div style={{ fontSize: 20, fontWeight: 800, color: "#fff", marginBottom: 4 }}>{mode === "login" ? "Masuk ke STRATIX" : "Buat Akun STRATIX"}</div>
        <div style={{ fontSize: 13, color: "rgba(255,255,255,.6)", marginBottom: 20 }}>Ruang kerja konsultan AI Anda.</div>
        {mode === "signup" && <input style={inp} placeholder="Nama" value={name} onChange={(e) => setName(e.target.value)} />}
        <input style={inp} type="email" placeholder="Email" value={email} onChange={(e) => setEmail(e.target.value)} />
        <input style={inp} type="password" placeholder="Kata sandi" value={pass} onChange={(e) => setPass(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()} />
        {err ? <div style={{ fontSize: 12.5, color: "#FCA5A5", marginBottom: 12, display: "flex", gap: 6, alignItems: "center" }}><Icon n="alert-circle" s={14} /> {err}</div> : null}
        <button onClick={submit} style={{ width: "100%", height: 46, borderRadius: 11, border: "none", background: "var(--grad-blade, linear-gradient(120deg,#12A3B4,#0E7C8B))", color: "#fff", fontSize: 14.5, fontWeight: 700, cursor: "pointer", fontFamily: "var(--font-sans)" }}>
          {mode === "login" ? "Masuk" : "Daftar"}
        </button>
        <div style={{ fontSize: 12.5, color: "rgba(255,255,255,.6)", marginTop: 16, textAlign: "center" }}>
          {mode === "login" ? "Belum punya akun? " : "Sudah punya akun? "}
          <a href="#" onClick={(e) => { e.preventDefault(); setErr(""); setMode(mode === "login" ? "signup" : "login"); }} style={{ color: "#4FD1C5", fontWeight: 700 }}>{mode === "login" ? "Daftar" : "Masuk"}</a>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { LandingScreen, AuthScreen });

<script type="text/babel" data-file="shared.jsx">
/* global React */
const { StatCard, Badge, IconButton, Tooltip, Button } = window.STRATIXDesignSystem_72cbdd;

/* React-owned Lucide icon: builds an inline <svg> from lucide.icons and injects it
   into a span via ref. React only manages the span (no JSX children), so re-renders
   never touch the SVG internals — no removeChild crashes. */
function lucideSvg(name, size) {
  const L = window.lucide;
  if (!L || !L.icons) return "";
  const pascal = String(name).replace(/(^|-)([a-z0-9])/g, (_, __, c) => c.toUpperCase());
  const node = L.icons[pascal];
  if (!node) return "";
  const body = (node[2] || []).map(([tag, attrs]) =>
    `<${tag} ${Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(" ")}></${tag}>`
  ).join("");
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${body}</svg>`;
}
function Icon({ n, s = 18, style = {} }) {
  const ref = React.useRef(null);
  React.useEffect(() => { if (ref.current) ref.current.innerHTML = lucideSvg(n, s); }, [n, s]);
  return <span ref={ref} style={{ display: "inline-flex", width: s, height: s, ...style }} />;
}
function refreshIcons() { /* no-op: icons are React-owned inline SVG now */ }

/* Company mark — colored rounded square with initials */
function CompanyMark({ initials, color, size = 40, radius = 10 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: radius, flexShrink: 0,
      background: color, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center",
      fontWeight: 800, fontSize: size * 0.36, letterSpacing: "-0.01em",
      boxShadow: "inset 0 0 0 1px rgba(255,255,255,0.14)",
    }}>{initials}</div>
  );
}

/* ---------- App shell ---------- */
function AppShell({ active, onNav, openCases = [], activeCaseId, dirtyIds = {}, jobs = {}, onSelectCase, onCloseCase, theme, onToggleTheme, children, title, subtitle, actions, onBack, user }) {
  const nav = [
    { id: "library", label: "Pustaka Case", icon: "folders" },
    { id: "workspace", label: "Ruang Kerja", icon: "layout-panel-left", disabled: !activeCaseId },
    { id: "settings", label: "Pengaturan", icon: "settings" },

  React.useEffect(refreshIcons);

    <div style={{ display: "flex", height: "100%", background: "var(--bg-app)", color: "var(--text-body)" }}>

        </div>
        <div style={{ padding: "14px 12px", flex: 1, overflowY: "auto" }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--text-faint)", padding: "6px 10px 8px" }}>Navigasi</div>
          {nav.map((n) => (
            <button key={n.id} onClick={() => !n.disabled && onNav(n.id)} disabled={n.disabled}
              style={{
                width: "100%", display: "flex", alignItems: "center", gap: 11, height: 40, padding: "0 10px",
                border: "none", borderRadius: "var(--radius-md)", marginBottom: 2, cursor: n.disabled ? "not-allowed" : "pointer",
                fontFamily: "var(--font-sans)", fontSize: "var(--text-md)", fontWeight: 600, textAlign: "left",
                color: active === n.id ? "var(--text-strong)" : n.disabled ? "var(--text-faint)" : "var(--text-muted)",
                background: active === n.id ? "var(--accent-quiet)" : "transparent",
                boxShadow: active === n.id ? "inset 3px 0 0 var(--accent)" : "none",
                opacity: n.disabled ? 0.6 : 1,
              }}>
              <Icon n={n.icon} s={18} style={{ color: active === n.id ? "var(--accent)" : "currentColor" }} />
              {n.label}
            </button>
          ))}

          {openCases.length > 0 && (
            <div style={{ marginTop: 18 }}>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--text-faint)", padding: "6px 10px 8px" }}>Case Aktif ({openCases.length})</div>
              {openCases.map((c) => {
                const on = c.id === activeCaseId;
                return (
                  <div key={c.id} style={{ marginBottom: 4 }}>
                    <div onClick={() => onSelectCase(c.id)} style={{ display: "flex", gap: 9, alignItems: "center", padding: "8px 8px 8px 10px", background: on ? "var(--accent-quiet)" : "var(--bg-subtle)", borderRadius: "var(--radius-md)", cursor: "pointer", boxShadow: on ? "inset 3px 0 0 var(--accent)" : "none" }}>
                      {c.logo
                        ? <img src={c.logo} alt="" style={{ width: 30, height: 30, borderRadius: 7, objectFit: "contain", background: "#fff", border: "1px solid var(--border)", padding: 2, flexShrink: 0 }} />
                        : <CompanyMark initials={c.initials} color={c.logoColor} size={30} radius={7} />}
                      <div style={{ minWidth: 0, flex: 1 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 5 }}>

                          {dirtyIds[c.id] && <span title="Belum disimpan" style={{ width: 6, height: 6, borderRadius: 999, background: "var(--warning-500)", flexShrink: 0 }} />}

                        <div style={{ fontFamily: "var(--font-mono)", fontSize: 10.5, color: "var(--text-muted)" }}>{c.id}</div>
                      </div>
                      <button onClick={(e) => { e.stopPropagation(); onCloseCase(c.id); }} title="Tutup case" aria-label="Tutup case"
                        style={{ width: 22, height: 22, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", border: "none", borderRadius: 6, background: "transparent", color: "var(--text-faint)", cursor: "pointer" }}
                        onMouseEnter={(e) => { e.currentTarget.style.background = "var(--negative-050)"; e.currentTarget.style.color = "var(--negative-600)"; }}
                        onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "var(--text-faint)"; }}>
                        <Icon n="x" s={13} />
                      </button>
                    </div>
                    {on && (
                      <div style={{ display: "flex", flexDirection: "column", gap: 1, marginTop: 4, marginLeft: 6 }}>
                        {[["finance", "Analis Keuangan", "line-chart"], ["risk", "Risiko & Fraud", "shield-alert"], ["transform", "Transformasi", "git-branch"]].map(([id, label, icon]) => {
                          const ran = (c.agents || []).includes(id);
                          const job = jobs[c.id + ":" + id] || {};
                          const busy = job.status === "running";
                          const sel = active === "agent-" + id;
                          const clickable = ran || busy;
                          return (
                            <button key={id} onClick={() => clickable && onNav("agent-" + id)} disabled={!clickable} title={clickable ? label : label + " — belum dijalankan"}

                              <Icon n={icon} s={15} />
                              <span style={{ flex: 1 }}>{label}</span>
                              {busy && <span title="Analisis berjalan" style={{ width: 12, height: 12, borderRadius: "50%", border: "2px solid var(--accent)", borderTopColor: "transparent", display: "inline-block", animation: "stx-spin 0.7s linear infinite", flexShrink: 0 }} />}
                              {!busy && ran && <span style={{ width: 6, height: 6, borderRadius: 999, background: "var(--positive-500)", flexShrink: 0 }} />}

            <div style={{ fontSize: 12, color: "var(--text-muted)", lineHeight: 1.3, minWidth: 0 }}>
              <div style={{ fontWeight: 600, color: "var(--text-body)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: 120 }}>{(user && user.name) || "Pengguna"}</div>
              <div style={{ fontSize: 11, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: 120 }}>{(user && user.email) || "STRATIX"}</div>

/* ---------- Lightweight charts (SVG, data-viz) ---------- */
function LineChart({ series, labels, height = 150, color = "var(--teal-500)", fill = true, area2 }) {
  const w = 520, h = height, pad = 8;
  const all = area2 ? series.concat(area2) : series;
  const max = Math.max(...all) * 1.08, min = Math.min(...all) * 0.9;
  const x = (i, arr) => pad + (i * (w - pad * 2)) / (arr.length - 1);
  const y = (v) => h - pad - ((v - min) / (max - min)) * (h - pad * 2 - 16);
  const path = (arr) => arr.map((v, i) => `${i ? "L" : "M"}${x(i, arr).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const areaPath = `${path(series)} L${x(series.length - 1, series)},${h - pad} L${x(0, series)},${h - pad} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={height} preserveAspectRatio="none" style={{ overflow: "visible" }}>
      <defs>
        <linearGradient id="stx-area" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.22" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      {[0.25, 0.5, 0.75].map((g) => <line key={g} x1={pad} x2={w - pad} y1={pad + g * (h - pad * 2)} y2={pad + g * (h - pad * 2)} stroke="var(--data-grid)" strokeWidth="1" />)}
      {fill && <path d={areaPath} fill="url(#stx-area)" />}
      {area2 && <path d={path(area2)} fill="none" stroke="var(--slate-400)" strokeWidth="2" strokeDasharray="4 4" />}
      <path d={path(series)} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
      {series.map((v, i) => <circle key={i} cx={x(i, series)} cy={y(v)} r="3.2" fill="var(--surface)" stroke={color} strokeWidth="2" />)}
    </svg>
  );
}

function BarChart({ series, labels, height = 150, color = "var(--navy-700)" }) {
  const max = Math.max(...series) * 1.1;
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 10, height, paddingTop: 8 }}>
      {series.map((v, i) => (
        <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", height: "100%", justifyContent: "flex-end" }}>
          <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-muted)", marginBottom: 5 }}>{v}</div>
          <div style={{ width: "100%", maxWidth: 46, height: `${(v / max) * 100}%`, background: i === series.length - 1 ? "var(--grad-blade)" : color, borderRadius: "5px 5px 0 0", transition: "height var(--dur-slow) var(--ease-out)" }} />
          <div style={{ fontSize: 11, color: "var(--text-faint)", marginTop: 7 }}>{labels[i]}</div>
        </div>
      ))}
    </div>
  );
}

function Donut({ value, size = 96, stroke = 11, color = "var(--teal-500)", track = "var(--bg-subtle)", label }) {
  const r = (size - stroke) / 2, c = 2 * Math.PI * r, off = c - (value / 100) * c;
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={track} strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round" style={{ transition: "stroke-dashoffset var(--dur-slower) var(--ease-out)" }} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 22, fontWeight: 600, color: "var(--text-strong)" }}>{value}</span>
        {label && <span style={{ fontSize: 10, color: "var(--text-muted)" }}>{label}</span>}
      </div>
    </div>
  );
}

/* Section heading */
function SectionTitle({ eyebrow, title, right }) {

    </div>
  );
}

              <div style={{ fontWeight: 700, color: "var(--text-strong)", fontSize: 14 }}>Isi otomatis dengan AI</div>
              <div style={{ fontSize: 12.5, color: "var(--text-body)", marginTop: 2 }}>Unggah hingga 3 dokumen atau masukkan website — AI akan mengisi Data Primer. Anda tetap dapat mengedit sebelum menyimpan.</div>
              <div style={{ display: "flex", gap: 10, marginTop: 12, flexWrap: "wrap" }}>
                <div style={{ flex: 1, minWidth: 200 }}><Input value={form.website} onChange={(e) => setForm({ ...form, website: e.target.value })} prefix={<Icon n="globe" s={15} />} placeholder="website perusahaan" /></div>
                <input ref={primerFileRef} type="file" accept=".pdf,.xlsx,.xls,.csv,.docx,.txt" multiple style={{ display: "none" }} onChange={onPrimerDocs} />
                <Button variant="secondary" iconLeft={<Icon n="upload" s={15} />} disabled={primerDocs.length >= 3} onClick={() => primerFileRef.current && primerFileRef.current.click()}>Unggah ({primerDocs.length}/3)</Button>
                <Button variant="accent" loading={filling} iconLeft={filling ? null : <Icon n="wand-2" s={15} />} onClick={runAutofill}>{filling ? "Membaca…" : "Isi otomatis"}</Button>
              </div>
              {primerDocs.length > 0 && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
                  {primerDocs.map((d, i) => (
                    <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, color: "var(--text-body)", background: "var(--surface)", border: "1px solid var(--border)", padding: "4px 8px", borderRadius: "var(--radius-sm)" }}>
                      <Icon n="file-text" s={13} />{d.name}
                      <button onClick={() => setPrimerDocs((p) => p.filter((_, j) => j !== i))} style={{ border: "none", background: "transparent", cursor: "pointer", color: "var(--text-faint)", display: "inline-flex", padding: 0 }}><Icon n="x" s={12} /></button>
                    </span>
                  ))}
                </div>
              )}
              {afErr && <div style={{ fontSize: 12, color: "var(--negative-600)", marginTop: 10, display: "flex", gap: 6, alignItems: "flex-start" }}><Icon n="alert-circle" s={13} /> {afErr}</div>}
            </div>
          </div>
        </div>

        {autofilled && <div style={{ marginBottom: 18 }}><Alert tone="positive" title="Data Primer terisi otomatis">Tinjau dan sesuaikan sebelum menyimpan.</Alert></div>}

        {/* Logo perusahaan */}
        <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 18, padding: 14, border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", background: "var(--surface-sunken)" }}>
          {form.logo
            ? <img src={form.logo} alt="logo" style={{ width: 56, height: 56, borderRadius: 12, objectFit: "contain", background: "#fff", border: "1px solid var(--border)", padding: 4, flexShrink: 0 }} />
            : <CompanyMark initials={initials} color="#0E7C8B" size={56} radius={12} />}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "var(--text-strong)" }}>Logo perusahaan</div>
            <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 2, lineHeight: 1.5 }}>Kosongkan agar AI mengenali logo otomatis dari website atau dokumen. Kini menampilkan inisial <strong>{initials}</strong>.</div>
          </div>
          <input ref={logoRef} type="file" accept="image/*" style={{ display: "none" }} onChange={onLogoPick} />
          {form.logo && <Button variant="ghost" size="sm" onClick={() => setForm({ ...form, logo: null })}>Hapus</Button>}
          <Button variant="secondary" size="sm" iconLeft={<Icon n="upload" s={15} />} onClick={() => logoRef.current && logoRef.current.click()}>Unggah logo</Button>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "minmax(0, 1fr) minmax(0, 1fr)", gap: 16 }}>
          {field("Nama perusahaan", <Input value={company} onChange={(e) => setForm && setCompany(e.target.value)} />)}
          {field("Tahun berdiri", <Input value={form.founded} onChange={(e) => setForm({ ...form, founded: e.target.value })} placeholder="mis. 1994" />)}
          {field("Sektor Industri (BI)", <Select value={form.sector} onChange={(e) => setForm({ ...form, sector: e.target.value })} placeholder="Pilih sektor (klasifikasi BI)" options={(window.STX_DATA.sectorsBI || []).concat(form.sector && !(window.STX_DATA.sectorsBI || []).includes(form.sector) ? [form.sector] : [])} />)}
          {field("Bidang usaha", <Select value={form.bidang} onChange={(e) => setForm({ ...form, bidang: e.target.value })} placeholder="Pilih bidang usaha" options={(window.STX_DATA.bidangUsaha || []).concat(form.bidang && !(window.STX_DATA.bidangUsaha || []).includes(form.bidang) ? [form.bidang] : [])} />)}
          {field("Revenue tahunan", <Input value={form.revenue} onChange={(e) => setForm({ ...form, revenue: e.target.value })} prefix="Rp" placeholder="4.820.000.000.000" />)}
          {field("Per bulan / tahun", <Input type="month" value={form.revenueDate} onChange={(e) => setForm({ ...form, revenueDate: e.target.value })} />, "Periode acuan angka revenue.")}
          <div style={{ gridColumn: "1 / -1" }}>
            {field("Status perusahaan", <Select value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })} placeholder="Pilih status" options={["BUMN", "Multinasional", "Swasta Nasional", "SME", "UMKM"]} />)}
          </div>
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 26 }}>
          <Button variant="ghost" iconLeft={<Icon n="arrow-left" s={16} />} onClick={() => setStep(1)}>Kembali</Button>
          <Button variant="primary" iconLeft={<Icon n="check" s={16} />} onClick={() => onCreate({ id: caseId, name: caseName || (company + " — Due Diligence"), company, initials, logoColor: "#0E7C8B", logo: form.logo || null, sector: form.sector || "—", bidang: form.bidang || "", status: form.status || "—", founded: form.founded, website: form.website || "", revenue: fmtRevenue(form.revenue), revenueDate: form.revenueDate, docText: primerDocs, updated: "baru saja", agents: [], analysis: {}, health: "Sehat" })}>Simpan Data Primer</Button>
        </div>
      </Card>
    </div>
  );
}

Object.assign(window, { CaseLibrary, NewCaseFlow });

</script>
<script type="text/babel" data-file="workspace.jsx">
/* global React, Icon, refreshIcons, CompanyMark, SectionTitle */
const WsNS = window.STRATIXDesignSystem_72cbdd;

function CaseWorkspace({ caseCtx, docs, agents, onRunAgent, dirty, jobs, onStartJob, onClearJob, onMarkDirty, onSave, onRequestClose }) {
  const { Card, Badge, Button, Alert, Tag, ProgressBar, Input, Textarea, Select, Dialog } = WsNS;
  const [err, setErr] = React.useState("");
  const [parsing, setParsing] = React.useState(false);
  const docFileRef = React.useRef(null);
  const [, force] = React.useReducer((x) => x + 1, 0);
  const mark = () => { onMarkDirty && onMarkDirty(); };
  const AI = window.STX_AI;
  const uploaded = caseCtx.docText || [];
  const onDocs = async (e) => {
    const files = [...(e.target.files || [])];
    if (!files.length || !AI) return;
    setParsing(true); setErr("");
    caseCtx.docText = caseCtx.docText || [];
    for (const f of files) {
      const r = await AI.parseFile(f);
      caseCtx.docText.push({ name: r.name, ext: r.ext, chars: r.chars, text: r.text });
      force();
    }
    setParsing(false); mark();
  };
  const removeDoc = (i) => { caseCtx.docText.splice(i, 1); mark(); force(); };
  const logoRef = React.useRef(null);
  const onLogo = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => { caseCtx.logo = r.result; mark(); force(); };
    r.readAsDataURL(f);
  };

  // ---- Edit Data Primer ----
  const [editing, setEditing] = React.useState(false);
  const [ef, setEf] = React.useState({});
  const [filling, setFilling] = React.useState(false);
  const [fillErr, setFillErr] = React.useState("");
  const editLogoRef = React.useRef(null);
  const openEdit = () => {
    setEf({ company: caseCtx.company || "", founded: caseCtx.founded || "", sector: caseCtx.sector || "", bidang: caseCtx.bidang || "", status: caseCtx.status || "", revenue: caseCtx.revenue || "", revenueDate: caseCtx.revenueDate || "", website: caseCtx.website || "", logo: caseCtx.logo || null });
    setFilling(false); setFillErr(""); setEditing(true);
  };
  const runAiUpdate = async () => {
    if (!AI || !AI.hasKey()) { setFillErr("API Key Anthropic belum diatur. Buka Pengaturan → API Key."); return; }
    const ctx = window.STX_AI.buildContext(caseCtx.docText);
    if (!ctx.trim() && !(ef.website || "").trim()) { setFillErr("Masukkan website atau unggah dokumen pada Langkah 1 terlebih dahulu."); return; }
    setFilling(true); setFillErr("");
    try {
      const r = await AI.analyzePrimer({ company: ef.company, contextText: ctx, website: ef.website });
      setEf((p) => ({ ...p, founded: r.founded || p.founded, sector: r.sector || p.sector, bidang: r.bidang || p.bidang, revenue: r.revenue || p.revenue, revenueDate: r.revenueDate || p.revenueDate, status: r.status || p.status, company: (!p.company && r.company) ? r.company : p.company }));
    } catch (e) {
      setFillErr("Update otomatis gagal: " + e.message);
    } finally {
      setFilling(false);
    }
  };
  const onEditLogo = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => setEf((p) => ({ ...p, logo: r.result }));
    r.readAsDataURL(f);
  };
  const saveEdit = () => {
    Object.assign(caseCtx, { company: ef.company, founded: ef.founded, sector: ef.sector, bidang: ef.bidang, status: ef.status, revenue: ef.revenue, revenueDate: ef.revenueDate, website: ef.website, logo: ef.logo, updated: "baru saja" });
    setEditing(false); mark(); force();
  };
  const efield = (label, node) => (
    <div>
      <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "var(--text-body)", marginBottom: 6 }}>{label}</label>
      {node}
    </div>
  );

  React.useEffect(refreshIcons);

  const fileIcon = { pdf: "file-text", xls: "sheet", xlsx: "sheet", csv: "sheet", doc: "file-type-2", docx: "file-type-2", txt: "file-text" };
  const jobOf = (id) => (jobs || {})[caseCtx.id + ":" + id] || {};
  const startAgent = (id) => { setErr(""); onStartJob && onStartJob(caseCtx, id); };

  return (
    <div style={{ maxWidth: 1000, margin: "0 auto" }}>
      {/* Save / Close bar */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
        <div>
          {dirty
            ? <Badge tone="warning" dot>Perubahan belum disimpan</Badge>
            : <span style={{ fontSize: 12, color: "var(--text-faint)", display: "inline-flex", alignItems: "center", gap: 6 }}><Icon n="check" s={13} /> Semua perubahan tersimpan</span>}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {dirty && <Button variant="primary" size="sm" iconLeft={<Icon n="save" s={14} />} onClick={onSave}>Simpan</Button>}
          <Button variant="secondary" size="sm" iconLeft={<Icon n="x" s={14} />} onClick={onRequestClose}>Tutup</Button>
        </div>
      </div>

      {/* Case header */}
      <Card padding="lg" style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
          <div style={{ position: "relative", flexShrink: 0 }}>
            {caseCtx.logo
              ? <img src={caseCtx.logo} alt="logo" style={{ width: 56, height: 56, borderRadius: 14, objectFit: "contain", background: "#fff", border: "1px solid var(--border)", padding: 4 }} />
              : <CompanyMark initials={caseCtx.initials} color={caseCtx.logoColor} size={56} radius={14} />}
            <input ref={logoRef} type="file" accept="image/*" style={{ display: "none" }} onChange={onLogo} />
            <button onClick={() => logoRef.current && logoRef.current.click()} title="Ganti logo" style={{ position: "absolute", right: -4, bottom: -4, width: 22, height: 22, borderRadius: 999, border: "2px solid var(--surface)", background: "var(--brand)", color: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: 0 }}><Icon n="camera" s={11} /></button>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--text-muted)" }}>{caseCtx.id}</span>
              <Badge tone="brand" size="sm">{caseCtx.status}</Badge>
            </div>
            <div style={{ fontSize: 20, fontWeight: 700, color: "var(--text-strong)", letterSpacing: "-0.01em", marginTop: 2 }}>{caseCtx.company}</div>
          </div>
          <div style={{ display: "flex", gap: 22 }}>
            {[["Sektor", caseCtx.sector], ["Berdiri", caseCtx.founded], ["Revenue", caseCtx.revenue]].map(([k, v]) => (
              <div key={k}>
                <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.06em", color: "var(--text-faint)", fontWeight: 700 }}>{k}</div>
                <div style={{ fontSize: 14, fontWeight: 600, color: "var(--text-strong)", marginTop: 3, fontFamily: k === "Revenue" || k === "Berdiri" ? "var(--font-mono)" : "inherit" }}>{v}</div>
              </div>
            ))}
          </div>
          <Button variant="secondary" size="sm" iconLeft={<Icon n="pencil" s={14} />} onClick={openEdit}>Edit Data Primer</Button>
        </div>
      </Card>

      {/* Step 1: documents */}
      <SectionTitle eyebrow="Langkah 1" title="Dokumen & Keterangan" right={<Badge tone="accent" dot>{uploaded.length ? `${uploaded.length} dokumen terunggah` : `${docs.length} contoh`}</Badge>} />
      <div style={{ display: "grid", gridTemplateColumns: "minmax(0, 1.3fr) minmax(0, 1fr)", gap: 16, marginBottom: 28 }}>
        <Card>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {uploaded.length === 0 && <div style={{ fontSize: 12, color: "var(--text-faint)", padding: "2px 2px 6px" }}>Belum ada dokumen diunggah. Contoh di bawah hanya ilustrasi — unggah dokumen asli untuk dianalisis AI.</div>}
            {uploaded.map((d, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", border: "1px solid var(--teal-400)", borderRadius: "var(--radius-md)", background: "var(--accent-quiet)" }}>
                <div style={{ width: 34, height: 34, borderRadius: 8, background: "var(--surface)", color: "var(--accent-hover)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon n={fileIcon[d.ext] || "file"} s={17} /></div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text-strong)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{d.name}</div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", fontFamily: "var(--font-mono)" }}>{d.chars.toLocaleString("id-ID")} karakter terbaca</div>
                </div>
                <Badge tone={d.chars > 40 ? "positive" : "warning"} size="sm" dot>{d.chars > 40 ? "terbaca" : "kosong"}</Badge>
                <button onClick={() => removeDoc(i)} title="Hapus" style={{ width: 24, height: 24, border: "none", background: "transparent", color: "var(--text-faint)", cursor: "pointer", display: "inline-flex", alignItems: "center", justifyContent: "center" }}><Icon n="x" s={14} /></button>
              </div>
            ))}
            {uploaded.length === 0 && docs.map((d) => (
              <div key={d.name} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", border: "1px solid var(--border-subtle)", borderRadius: "var(--radius-md)", background: "var(--surface-sunken)", opacity: 0.65 }}>
                <div style={{ width: 34, height: 34, borderRadius: 8, background: "var(--bg-subtle)", color: "var(--text-muted)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon n={fileIcon[d.type] || "file"} s={17} /></div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text-muted)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{d.name}</div>
                  <div style={{ fontSize: 11, color: "var(--text-faint)", fontFamily: "var(--font-mono)" }}>{d.size} · contoh</div>
                </div>
                <Badge tone="neutral" size="sm">{d.kind}</Badge>
              </div>
            ))}
            <input ref={docFileRef} type="file" accept=".pdf,.xlsx,.xls,.csv,.docx,.txt" multiple style={{ display: "none" }} onChange={onDocs} />
            <button onClick={() => docFileRef.current && docFileRef.current.click()} disabled={parsing} style={{ marginTop: 4, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, height: 44, border: "1.5px dashed var(--border-strong)", borderRadius: "var(--radius-md)", background: parsing ? "var(--bg-subtle)" : "transparent", color: "var(--text-muted)", cursor: parsing ? "wait" : "pointer", fontFamily: "var(--font-sans)", fontSize: 13, fontWeight: 600 }}>
              <Icon n="upload-cloud" s={17} /> {parsing ? "Memproses dokumen…" : "Unggah dokumen (PDF, Excel, Word, teks)"}
            </button>
          </div>
        </Card>
        <Card>
          <div style={{ fontSize: 13, fontWeight: 700, color: "var(--text-strong)", marginBottom: 8 }}>Keterangan tambahan</div>
          <Textarea value={caseCtx.notes || ""} onChange={(e) => { caseCtx.notes = e.target.value; mark(); force(); }} rows={4} placeholder="mis. Fokuskan pada siklus pendapatan dan piutang; soroti transaksi pihak berelasi." />
          <div style={{ fontSize: 11, color: "var(--text-faint)", marginTop: 6 }}>Keterangan ini disertakan sebagai konteks tambahan saat agen berjalan.</div>
          <div style={{ marginTop: 14, fontSize: 12, fontWeight: 700, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.06em" }}>Dokumen dikenali</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 8 }}>
            {uploaded.length
              ? uploaded.map((d, i) => <Tag key={i} icon={<Icon n="file-text" s={12} />}>{d.name}</Tag>)
              : <span style={{ fontSize: 12, color: "var(--text-faint)" }}>Belum ada dokumen — unggah untuk dianalisis.</span>}
          </div>
        </Card>
      </div>

      {/* Step 2: agent selection */}
      {err && <div style={{ marginBottom: 14 }}><Alert tone="negative" title="Tidak dapat menjalankan analisis" onClose={() => setErr("")}>{err}</Alert></div>}
      <SectionTitle eyebrow="Langkah 2" title="Pilih Agen Analisis" right={<span style={{ fontSize: 12, color: "var(--text-muted)" }}>Setiap agen membaca dokumen asli — bukan ringkasan.</span>} />
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, minmax(0, 1fr))", gap: 16 }}>
        {agents.map((a) => {
          const job = jobOf(a.id);
          const isRun = job.status === "running";
          const done = caseCtx.agents.includes(a.id);
          return (
            <Card key={a.id} padding="lg" style={{ position: "relative", overflow: "hidden", borderColor: isRun ? a.color : "var(--border)" }}>
              <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between" }}>
                <div style={{ width: 48, height: 48, borderRadius: 12, background: a.bg, color: a.color, display: "flex", alignItems: "center", justifyContent: "center" }}><Icon n={a.icon} s={24} /></div>
                {isRun ? <Badge tone="accent" size="sm" dot>Berjalan</Badge> : done && <Badge tone="positive" size="sm" dot>Selesai</Badge>}
              </div>
              <div style={{ fontSize: 16, fontWeight: 700, color: "var(--text-strong)", marginTop: 14, letterSpacing: "-0.01em" }}>{a.name}</div>
              <p style={{ fontSize: 13, color: "var(--text-muted)", lineHeight: 1.55, marginTop: 7, minHeight: 74 }}>{a.desc}</p>
              {job.status === "error" && <div style={{ fontSize: 12, color: "var(--negative-600)", marginBottom: 8, display: "flex", gap: 6, alignItems: "flex-start" }}><Icon n="alert-circle" s={13} /> {job.error}</div>}
              {isRun ? (
                <div style={{ marginTop: 10 }}>
                  <ProgressBar value={job.progress || 10} tone="blade" showLabel label="Menganalisis dokumen…" />
                  <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11.5, color: "var(--text-muted)", marginTop: 8 }}><Icon n="info" s={12} /> Berjalan di latar belakang — boleh pindah menu.</div>
                </div>
              ) : done ? (
                <div style={{ marginTop: 12 }}>
                  <Button variant="primary" block iconLeft={<Icon n="eye" s={15} />} onClick={() => onRunAgent(a.id)}>
                    Lihat Analisis
                  </Button>
                  <button onClick={() => startAgent(a.id)} style={{ width: "100%", marginTop: 8, border: "none", background: "transparent", cursor: "pointer", fontFamily: "var(--font-sans)", fontSize: 12.5, fontWeight: 600, color: "var(--text-muted)", display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "4px 0" }}>
                    <Icon n="refresh-cw" s={13} /> Analisis ulang
                  </button>
                </div>
              ) : (
                <Button variant="primary" block iconLeft={<Icon n="play" s={15} />} onClick={() => startAgent(a.id)} style={{ marginTop: 12 }}>
                  Jalankan agen
                </Button>
              )}
              <div style={{ position: "absolute", right: -20, bottom: -20, opacity: 0.05, color: a.color }}><Icon n={a.icon} s={120} /></div>
            </Card>
          );
        })}
      </div>

      {/* Dialog Edit Data Primer */}
      <Dialog open={editing} onClose={() => setEditing(false)} title="Edit Data Primer" description={caseCtx.id} width={660}
        footer={<><Button variant="secondary" onClick={() => setEditing(false)}>Batal</Button><Button variant="primary" iconLeft={<Icon n="check" s={15} />} onClick={saveEdit}>Simpan Perubahan</Button></>}>
        <div style={{ maxHeight: "58vh", overflowY: "auto", paddingRight: 4 }}>
          {/* Perbarui via AI */}
          <div style={{ padding: 14, borderRadius: "var(--radius-md)", background: "var(--accent-quiet)", border: "1px solid var(--teal-400)", marginBottom: 16 }}>
            <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
              <div style={{ width: 34, height: 34, borderRadius: 9, background: "var(--grad-blade)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon n="sparkles" s={17} /></div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "var(--text-strong)" }}>Perbarui via AI</div>

      ${c.implication ? `<div style="font-size:11.5px;line-height:1.6;color:#22303F;margin-top:3px;"><b>Implikasi:</b> ${esc(c.implication)}</div>` : ""}
      ${c.rekomendasi ? `<div style="font-size:11.5px;line-height:1.6;color:#0E7C8B;margin-top:3px;"><b>Rekomendasi:</b> ${esc(c.rekomendasi)}</div>` : ""}
    </div>`).join("");
  const ov = document.createElement("div");
  ov.id = "stx-print-chat";
  ov.innerHTML = `
    <style>

      <div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#12A3B4;">STRATIX &middot; Laporan Analisis Keuangan</div>
      <div style="font-size:22px;font-weight:800;color:#0E2547;margin-top:5px;">${esc(p.company || "Perusahaan")}</div>
      <div style="font-size:12px;color:#6B7C8E;margin-top:3px;">${esc(p.periodLabel || "")}${p.caseId ? ` &middot; ${esc(p.caseId)}` : ""} &middot; ${new Date().toLocaleString("id-ID")}</div>
      ${p.verdict ? `<div style="font-size:12.5px;color:#22303F;margin-top:10px;line-height:1.6;background:#F1F5F9;border-radius:8px;padding:10px 12px;"><b>Kesimpulan Analis:</b> ${esc(p.verdict)}</div>` : ""}

/* ---------- Agen Analis Keuangan ---------- */
function AgentFinance({ d, caseCtx, onGenerateReview }) {
  const { Card, CardHeader, StatCard, DataTable, Badge, Alert, Tabs, Select, Button } = AgNS;
  const [tab, setTab] = React.useState("ringkasan");
  React.useEffect(refreshIcons);
  const statusBadge = (s) => <Badge tone={s === "Baik" ? "positive" : "warning"} size="sm">{s}</Badge>;
  const company = (caseCtx && caseCtx.company) || "Perusahaan";
  const concernLabel = { negative: "Tinggi", warning: "Sedang", info: "Perhatian" };

  // ---- Periode keuangan ----
  const years = d.revenueLabels;
  const revScale = Math.max(...((d.revenueSeries && d.revenueSeries.length) ? d.revenueSeries : [0])) >= 1000 ? 1000 : 1; // normalisasi Miliar -> Triliun bila AI kembalikan skala miliar
  const revSeries = (d.revenueSeries || []).map((v) => v / revScale);
  const [fromIdx, setFromIdx] = React.useState(0);
  const [toIdx, setToIdx] = React.useState(years.length - 1);
  const lo = Math.min(fromIdx, toIdx), hi = Math.max(fromIdx, toIdx);
  const nYears = hi - lo + 1;
  const multi = nYears > 1;
  const startYear = years[lo], endYear = years[hi];
  const rangeLabel = multi ? `${startYear}–${endYear}` : endYear;
  const revSlice = revSeries.slice(lo, hi + 1);
  const marginSlice = d.marginSeries.slice(lo, hi + 1);
  const labelSlice = years.slice(lo, hi + 1);
  const nums = (v, dg = 1) => (v >= 0 ? "+" : "") + v.toFixed(dg).replace(".", ",");
  const revNow = revSeries[hi], revPrev = revSeries[hi - 1];
  const revDelta = hi > 0 ? ((revNow - revPrev) / revPrev) * 100 : null;
  const marNow = d.marginSeries[hi], marDelta = hi > 0 ? (marNow - d.marginSeries[hi - 1]) : null;
  const cagr = multi ? (Math.pow(revNow / revSeries[lo], 1 / (hi - lo)) - 1) * 100 : null;
  const fmtT = (v) => v.toFixed(2).replace(".", ",");
  const revStart = revSeries[lo], marStart = d.marginSeries[lo], marEnd = d.marginSeries[hi];
  const ulasanLead = multi
    ? `Ulasan ini mencakup periode ${startYear}–${endYear} (${nYears} tahun). Sepanjang periode tersebut, pendapatan bergerak dari Rp ${fmtT(revStart)} T menjadi Rp ${fmtT(revNow)} T (CAGR ${cagr.toFixed(1).replace(".", ",")}%), dengan marjin EBITDA ${marStart.toFixed(1).replace(".", ",")}% menuju ${marEnd.toFixed(1).replace(".", ",")}%.`
    : `Ulasan ini difokuskan pada tahun buku ${endYear}, dengan pendapatan Rp ${fmtT(revNow)} T dan marjin EBITDA ${marEnd.toFixed(1).replace(".", ",")}%.`;
  const kpis = d.kpis.map((k, i) => {
    if (i === 0) return { ...k, label: `Revenue FY${endYear}`, value: "Rp " + revNow.toFixed(2).replace(".", ","), unit: "T", delta: revDelta != null ? nums(revDelta) + "%" : "—", hint: multi ? `vs ${years[hi - 1]}` : "YoY" };
    if (i === 1) return { ...k, label: `EBITDA Margin ${endYear}`, value: marNow.toFixed(1).replace(".", ","), unit: "%", delta: marDelta != null ? nums(marDelta) + "%" : "—", hint: hi > 0 ? `vs ${years[hi - 1]}` : "—" };
    return { ...k, hint: (k.hint && String(k.hint).length > 18) ? "YoY" : k.hint };
  });
  const setFrom = (v) => { setFromIdx(v); if (v > toIdx) setToIdx(v); };
  const setTo = (v) => { setToIdx(v); if (v < fromIdx) setFromIdx(v); };
  const applyPreset = (n) => { const t = years.length - 1; setToIdx(t); setFromIdx(Math.max(0, t - (n - 1))); };
  const yearOpts = years.map((y, i) => ({ value: String(i), label: y }));
  const periodKey = multi ? `${startYear}-${endYear}` : String(endYear);
  const periodLabelFull = multi ? `Tahun Buku ${startYear}–${endYear}` : `Tahun Buku ${endYear}`;
  const isFullRange = lo === 0 && hi === years.length - 1;
  const cachedReview = (d.reviewsByPeriod && d.reviewsByPeriod[periodKey]) || (isFullRange && d.review) || null;
  const onExportPDF = () => printFinanceReport({
    company, caseId: caseCtx && caseCtx.id, periodLabel: periodLabelFull,
    kpis, ratios: d.ratios, verdict: d.verdict,
    review: cachedReview || d.review, reviewMeta: d.reviewMeta, concerns: d.concerns,
  });
  const [revBusy, setRevBusy] = React.useState(false);
  const [revErr, setRevErr] = React.useState("");
  const hasDocs = !!(caseCtx && (caseCtx.docText || []).length > 0);
  const genReview = () => {
    if (!onGenerateReview) return;
    setRevErr(""); setRevBusy(true);
    Promise.resolve(onGenerateReview(periodLabelFull, periodKey))
      .then(() => setRevBusy(false))
      .catch((e) => { setRevErr((e && e.message) || String(e)); setRevBusy(false); });
  };

  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 20, maxWidth: 1760, margin: "0 auto", alignItems: "flex-start" }}>
      <div style={{ flex: "1 1 680px", minWidth: 0 }}>
      <ResultToolbar version="v3" onExport={onExportPDF} />
      <div style={{ marginBottom: 22 }}>
        <Tabs value={tab} onChange={setTab} items={[
          { value: "ringkasan", label: "Ringkasan", icon: <Icon n="layout-dashboard" s={15} /> },
          { value: "ulasan", label: "Ulasan Lengkap", icon: <Icon n="file-text" s={15} /> },
          { value: "redflags", label: "Red Flags & Concern", icon: <Icon n="alert-triangle" s={15} /> },
        ]} />
      </div>

      {/* Pemilih periode keuangan — berlaku untuk ketiga bagian */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap", marginBottom: 20, padding: "12px 16px", background: "var(--surface)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)" }}>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 7, fontSize: 12, fontWeight: 700, letterSpacing: "0.04em", textTransform: "uppercase", color: "var(--text-muted)" }}><Icon n="calendar-range" s={15} /> Periode Keuangan</span>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 12, color: "var(--text-faint)" }}>Dari</span>
          <div style={{ width: 92 }}><Select value={String(fromIdx)} onChange={(e) => setFrom(+e.target.value)} options={yearOpts} /></div>
          <span style={{ fontSize: 12, color: "var(--text-faint)" }}>sampai</span>
          <div style={{ width: 92 }}><Select value={String(toIdx)} onChange={(e) => setTo(+e.target.value)} options={yearOpts} /></div>
        </div>
        <Badge tone={multi ? "accent" : "neutral"} dot>{nYears} tahun</Badge>
        <div style={{ flex: 1 }} />
        <div style={{ display: "flex", gap: 6 }}>
          {[["1 Thn", 1], ["3 Thn", 3], ["5 Thn", 5]].map(([lbl, n]) => (
            <button key={lbl} onClick={() => applyPreset(n)} style={{ height: 30, padding: "0 12px", borderRadius: "var(--radius-sm)", border: "1px solid var(--border-strong)", background: nYears === n ? "var(--accent-quiet)" : "var(--surface)", color: nYears === n ? "var(--accent-hover)" : "var(--text-muted)", fontSize: 12.5, fontWeight: 600, cursor: "pointer", fontFamily: "var(--font-sans)" }}>{lbl}</button>
          ))}
        </div>
      </div>

      <div style={{ fontSize: 11.5, color: "var(--text-faint)", margin: "-6px 0 18px", display: "flex", alignItems: "center", gap: 6 }}>
        <Icon n="info" s={13} /> Rentang periode mengikuti data yang tersedia pada dokumen terunggah ({years[0]}–{years[years.length - 1]}).
      </div>

      {/* ---- Bagian 1: Ringkasan ---- */}
      {tab === "ringkasan" && (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, minmax(0, 1fr))", gap: 14, marginBottom: 20 }}>
            {kpis.map((k, i) => <StatCard key={k.label} {...k} accent={i === 0} icon={<Icon n={k.icon || ["trending-up", "percent", "wallet", "waves"][i] || "circle-dollar-sign"} s={18} />} />)}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "minmax(0, 1.4fr) minmax(0, 1fr)", gap: 16, marginBottom: 20 }}>
            <Card>
              <CardHeader title="Tren Pendapatan" subtitle={`Rp Triliun · ${rangeLabel}`} action={multi ? <Badge tone="positive" dot>CAGR {cagr.toFixed(1).replace(".", ",")}%</Badge> : null} />
              {revSlice.length > 1 ? (
                <>
                  <LineChart series={revSlice} labels={labelSlice} height={180} color="var(--teal-500)" />
                  <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, padding: "0 8px" }}>
                    {labelSlice.map((l) => <span key={l} style={{ fontSize: 11, color: "var(--text-faint)" }}>{l}</span>)}
                  </div>
                </>
              ) : (
                <div style={{ height: 180, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6 }}>
                  <span style={{ fontFamily: "var(--font-mono)", fontSize: 30, fontWeight: 600, color: "var(--text-strong)" }}>Rp {revNow.toFixed(2).replace(".", ",")} T</span>
                  <span style={{ fontSize: 12, color: "var(--text-muted)" }}>Pendapatan FY{endYear} · pilih ≥ 2 tahun untuk tren</span>
                </div>
              )}
            </Card>
            <Card>
              <CardHeader title="EBITDA Margin" subtitle={`% · ${rangeLabel}`} />
              <BarChart series={marginSlice} labels={labelSlice} height={190} color="var(--navy-600)" />
            </Card>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "minmax(0, 1.4fr) minmax(0, 1fr)", gap: 16 }}>
            <Card padding="none">
              <div style={{ padding: "16px 18px 12px" }}><CardHeader title="Rasio Keuangan Utama" subtitle={`Konsolidasi FY${endYear} vs benchmark industri`} /></div>
              <DataTable columns={[
                { key: "r", header: "Rasio", strong: true },
                { key: "v", header: `FY${endYear}`, mono: true, strong: true },
                { key: "b", header: "Benchmark", mono: true },
                { key: "s", header: "Status", align: "right", render: (v) => statusBadge(v) },
              ]} rows={d.ratios} style={{ border: "none", borderRadius: 0 }} />
            </Card>
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <Card>
                <CardHeader title="Skor Kesehatan" subtitle="Komposit finansial" />
                <div style={{ display: "flex", alignItems: "center", gap: 18 }}>
                  <Donut value={d.healthScore != null ? d.healthScore : 78} label="/100" color="var(--teal-500)" size={104} />
                  <div style={{ fontSize: 13, color: "var(--text-body)", lineHeight: 1.55 }}>

      {/* ---- Bagian 2: Ulasan Lengkap (naratif, layak print) ---- */}

                <div key={sec.h} style={{ marginBottom: 24 }}>

                  {String(sec.b || "").split(/\n\s*\n|\n(?=\s*Implikasi strategis)/i).map((para, k) => {

                    const isImpl = /^implikasi/i.test(tx);
                    return isImpl

                  <div style={{ fontSize: 14.5, fontWeight: 700, color: "var(--text-strong)" }}>Ulasan mendalam periode {rangeLabel} belum tersedia</div>
                  <div style={{ fontSize: 13, color: "var(--text-muted)", maxWidth: 480, margin: "6px auto 0", lineHeight: 1.55 }}>Ulasan disusun spesifik oleh AI untuk periode terpilih dan disimpan \u2014 memilih periode yang sama nanti tidak menjalankan ulang analisis.</div>
                  {revErr && <div style={{ fontSize: 12.5, color: "var(--negative-600)", marginTop: 10 }}>\u26a0 {revErr}</div>}
                  <div style={{ marginTop: 16 }}>
                    <Button variant="primary" loading={revBusy} disabled={revBusy || !hasDocs} iconLeft={revBusy ? null : <Icon n="sparkles" s={16} />} onClick={genReview}>
                      {revBusy ? "Menyusun ulasan\u2026" : (hasDocs ? `Buat ulasan periode ${rangeLabel}` : "Unggah dokumen dahulu")}

                  </div>
                </div>
              )}
              <div style={{ marginTop: 30, paddingTop: 18, borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", fontSize: 12, color: "var(--text-faint)" }}>
                <span>STRATIX · Konsultan AI</span>
                <span style={{ fontFamily: "var(--font-mono)" }}>Agen Analis Keuangan · v3</span>
              </div>
            </div>
          </Card>
        </div>
      )}

      {/* ---- Bagian 3: Red Flags & Concern ---- */}
      {tab === "redflags" && (
        <div>
          <Alert tone="warning" title="Catatan analitis, bukan indikasi fraud" style={{ marginBottom: 18 }}>
            Bagian ini merangkum kelemahan dan area perhatian yang muncul dari analisis keuangan. Untuk sinyal fraud dan modus kecurangan, gunakan Agen Risiko &amp; Fraud.
          </Alert>
          <div style={{ fontSize: 12.5, color: "var(--text-muted)", marginBottom: 16, lineHeight: 1.55 }}>Temuan berikut ditinjau untuk periode <strong style={{ color: "var(--text-strong)" }}>{rangeLabel}</strong> ({nYears} tahun), berdasarkan dokumen yang terunggah.</div>
          {/* Ringkasan tingkat */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, minmax(0, 1fr))", gap: 12, marginBottom: 18 }}>
            {[["Tinggi", "negative"], ["Sedang", "warning"], ["Perhatian", "info"]].map(([lbl, lv]) => {
              const n = d.concerns.filter((c) => concernLabel[c.level] === lbl).length;
              const clr = lv === "info" ? "teal" : lv;
              return (
                <div key={lbl} style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", background: "var(--surface)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)" }}>
                  <div style={{ width: 38, height: 38, borderRadius: 9, background: `var(--${lv}-050)`, color: `var(--${clr}-600)`, display: "flex", alignItems: "center", justifyContent: "center" }}><Icon n={lv === "negative" ? "alert-octagon" : lv === "warning" ? "alert-triangle" : "info"} s={18} /></div>
                  <div>
                    <div style={{ fontFamily: "var(--font-mono)", fontSize: 22, fontWeight: 600, color: "var(--text-strong)", lineHeight: 1 }}>{n}</div>
                    <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 2 }}>Tingkat {lbl}</div>
                  </div>
                </div>
              );

          {/* Tabel ringkasan temuan */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--text-muted)" }}>Ringkasan Temuan · Periode {rangeLabel}</div>
            <Badge tone="warning" dot>{d.concerns.length} area perhatian</Badge>
          </div>
          <div style={{ marginBottom: 22 }}>
            <DataTable columns={[
              { key: "no", header: "#", width: 40 },
              { key: "title", header: "Temuan", strong: true, wrap: true },
              { key: "area", header: "Area", render: (v) => <Badge tone="neutral" size="sm">{v}</Badge> },
              { key: "level", header: "Tingkat", render: (v) => <Badge tone={v === "info" ? "accent" : v} size="sm">{concernLabel[v]}</Badge> },
              { key: "nilai", header: "Nilai", mono: true, strong: true },
              { key: "benchmark", header: "Benchmark", mono: true },
              { key: "tren", header: "Tren", render: (v) => <Badge tone={v === "Memburuk" ? "negative" : v === "Membaik" ? "positive" : "neutral"} size="sm">{v}</Badge> },

          </div>

          {/* Uraian rinci */}
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 12 }}>Uraian Rinci &amp; Rekomendasi</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {d.concerns.map((c) => (
              <Card key={c.title} padding="md" style={{ borderLeft: `3px solid var(--${c.level === "negative" ? "negative" : c.level === "warning" ? "warning" : "teal"}-500)` }}>

                  <div style={{ width: 38, height: 38, borderRadius: 9, background: `var(--${c.level === "negative" ? "negative" : c.level === "warning" ? "warning" : "info"}-050)`, color: `var(--${c.level === "negative" ? "negative" : c.level === "warning" ? "warning" : "teal"}-600)`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    <Icon n={c.level === "negative" ? "trending-down" : c.level === "warning" ? "alert-triangle" : "info"} s={18} />
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 15, fontWeight: 700, color: "var(--text-strong)" }}>{c.title}</span>
                      <Badge tone={c.level === "info" ? "accent" : c.level} size="sm">{concernLabel[c.level]}</Badge>

                    </div>
                    <p style={{ fontSize: 13, color: "var(--text-muted)", margin: "7px 0 0", lineHeight: 1.55 }}>{c.detail}</p>
                    <div style={{ fontSize: 12.5, color: "var(--text-body)", marginTop: 8, display: "flex", gap: 6 }}>
                      <span style={{ fontWeight: 700, color: "var(--text-strong)", flexShrink: 0 }}>Implikasi:</span>
                      <span>{c.implication}</span>

                    <div style={{ fontSize: 12.5, color: "var(--text-body)", marginTop: 6, display: "flex", gap: 6, paddingTop: 8, borderTop: "1px dashed var(--border)" }}>

                      <span>{c.rekomendasi}</span>
                    </div>
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    <div style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.06em", color: "var(--text-faint)", fontWeight: 700 }}>Metrik</div>
                    <div style={{ fontFamily: "var(--font-mono)", fontSize: 12.5, fontWeight: 600, color: "var(--text-strong)", marginTop: 3 }}>{c.metric}</div>

      )}
      </div>
      <ChatDock>
        <ChatPanel caseId={caseCtx && caseCtx.id} caseName={company} agentKey="finance" agentLabel="Agen Analis Keuangan" period={rangeLabel} contextText={caseCtx && window.STX_AI.buildContext(caseCtx.docText, 160000)} />
      </ChatDock>
    </div>
  );
}

/* ---------- Agen Risiko & Fraud ---------- */
function AgentRisk({ d, caseCtx }) {
  const { Card, CardHeader, Badge, Alert, RiskBadge, RiskCell } = AgNS;
  React.useEffect(refreshIcons);
  const company = (caseCtx && caseCtx.company) || "Perusahaan";
  const rowLabels = ["Katastropik", "Besar", "Sedang", "Kecil", "Minor"];
  const colLabels = ["Jarang", "Kecil", "Mungkin", "Sering", "Hampir pasti"];
  const levelOrder = [["critical", "Kritis"], ["high", "Tinggi"], ["moderate", "Sedang"], ["low", "Rendah"]];
  const flags = d.flags || [];
  const counts = levelOrder.map(([lv, lbl]) => [lbl, flags.filter((f) => f.level === lv).length, lv]).filter(([, n]) => n > 0);
  // Pemetaan flag BERNOMOR ke sel matriks (impact=baris, likelihood=kolom)
  const cellNums = {};
  flags.forEach((f, i) => {
    if (f.impact && f.likelihood) {
      const ri = 5 - Math.min(5, Math.max(1, f.impact));
      const ci = Math.min(5, Math.max(1, f.likelihood)) - 1;
      const k = ri + "-" + ci;
      (cellNums[k] = cellNums[k] || []).push(i + 1);
    }
  });
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 20, maxWidth: 1760, margin: "0 auto", alignItems: "flex-start" }}>
      <div style={{ flex: "1 1 680px", minWidth: 0 }}>
      <ResultToolbar version="v2" />
      <div style={{ display: "grid", gridTemplateColumns: "minmax(0, 1fr) minmax(0, 1.1fr)", gap: 16, marginBottom: 20 }}>
        <Card>
          <CardHeader title="Indeks Risiko Fraud" subtitle="Komposit dari 4 dimensi temuan" action={<RiskBadge level={d.level} />} />
          <div style={{ display: "flex", alignItems: "center", gap: 22 }}>
            <Donut value={d.score} label="/100" color="var(--risk-high)" track="var(--bg-subtle)" size={116} />
            <div style={{ display: "flex", flexDirection: "column", gap: 8, flex: 1 }}>
              {counts.map(([l, n, lv]) => (
                <div key={l} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", fontSize: 13 }}>
                  <span style={{ display: "inline-flex", alignItems: "center", gap: 8, color: "var(--text-body)" }}><span style={{ width: 8, height: 8, borderRadius: 2, background: `var(--risk-${lv})` }} />{l}</span>
                  <span style={{ fontFamily: "var(--font-mono)", fontWeight: 600, color: "var(--text-strong)" }}>{n} temuan</span>
                </div>
              ))}
            </div>
          </div>
        </Card>
        <Card>
          <CardHeader title="Matriks Risiko" subtitle="Dampak × Kemungkinan · angka = nomor red flag" />
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ display: "flex", flexDirection: "column", justifyContent: "space-around", fontSize: 10, color: "var(--text-faint)", textAlign: "right", paddingBottom: 18 }}>
              {rowLabels.map((r) => <span key={r} style={{ height: 18, lineHeight: "18px" }}>{r}</span>)}
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(5, minmax(0, 1fr))", gap: 4 }}>
                {d.matrix.flatMap((row, ri) => row.map((lv, ci) => (
                  <RiskCell key={ri + "-" + ci} level={lv} style={{ minHeight: 34 }}>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 3, justifyContent: "center", alignItems: "center" }}>
                      {(cellNums[ri + "-" + ci] || []).map((n) => (
                        <span key={n} style={{ minWidth: 18, height: 18, padding: "0 4px", borderRadius: 9, background: "rgba(255,255,255,0.94)", color: "var(--navy-900)", fontSize: 11, fontWeight: 800, display: "inline-flex", alignItems: "center", justifyContent: "center", boxShadow: "0 1px 2px rgba(0,0,0,0.28)" }}>{n}</span>
                      ))}
                    </div>
                  </RiskCell>
                )))}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(5, minmax(0, 1fr))", gap: 4, marginTop: 5 }}>
                {colLabels.map((c) => <span key={c} style={{ fontSize: 9, color: "var(--text-faint)", textAlign: "center" }}>{c}</span>)}
              </div>
            </div>
          </div>
        </Card>
      </div>

      <SectionTitle eyebrow="Temuan" title="Red Flags & Indikasi Fraud" right={<Badge tone="negative" dot>{d.flags.length} temuan aktif</Badge>} />
      <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 20 }}>
        {d.flags.map((f, i) => (
          <Card key={i} padding="md" style={{ borderLeft: `3px solid var(--risk-${f.level})` }}>
            <div style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
              <div style={{ width: 32, height: 32, borderRadius: "50%", background: `var(--risk-${f.level})`, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 14, fontWeight: 800 }}>{i + 1}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 15, fontWeight: 700, color: "var(--text-strong)" }}>{f.title}</span>
                  <RiskBadge level={f.level} size="sm" />
                  <Badge tone="neutral" size="sm">{f.area}</Badge>
                  {f.modus && <Badge tone="negative" size="sm">{f.modus}</Badge>}
                  <span style={{ marginLeft: "auto", fontSize: 11, color: "var(--text-faint)", fontFamily: "var(--font-mono)", whiteSpace: "nowrap" }}>Dampak {f.impact || "—"} × Kmk {f.likelihood || "—"}</span>
                </div>
                <p style={{ fontSize: 13.5, color: "var(--text-body)", marginTop: 8, lineHeight: 1.6 }}>{f.detail}</p>
                {f.evidence && (
                  <div style={{ marginTop: 10, padding: "10px 12px", background: "var(--bg-subtle)", borderRadius: "var(--radius-md)", borderLeft: "2px solid var(--border-strong)" }}>
                    <div style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.06em", color: "var(--text-faint)", fontWeight: 700, marginBottom: 3 }}>Bukti dari dokumen</div>
                    <div style={{ fontSize: 13, color: "var(--text-body)", lineHeight: 1.55 }}>{f.evidence}</div>
                  </div>
                )}
                {f.implication && (
                  <p style={{ marginTop: 8, fontSize: 13, color: "var(--text-muted)", lineHeight: 1.55 }}>
                    <span style={{ fontWeight: 700, color: "var(--negative-600)" }}>Implikasi: </span>{f.implication}
                  </p>
                )}
                {f.action && (
                  <div style={{ marginTop: 10, padding: "11px 13px", background: `var(--risk-${f.level}-050)`, border: `1px solid var(--risk-${f.level})`, borderRadius: "var(--radius-md)", display: "flex", gap: 9, alignItems: "flex-start" }}>
                    <span style={{ color: `var(--risk-${f.level})`, flexShrink: 0, marginTop: 1 }}><Icon n="arrow-right" s={16} /></span>
                    <div><div style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", fontWeight: 800, color: `var(--risk-${f.level})` }}>Tindak lanjut</div><div style={{ fontSize: 13, color: "var(--text-strong)", fontWeight: 600, lineHeight: 1.55, marginTop: 2 }}>{f.action}</div></div>
                  </div>
                )}
              </div>
            </div>
          </Card>
        ))}
      </div>
      <Alert tone="negative" title="Rekomendasi tindak lanjut forensik">{d.recommendation}</Alert>
      </div>
      <ChatDock>
        <ChatPanel caseId={caseCtx && caseCtx.id} caseName={company} agentKey="risk" agentLabel="Agen Risiko & Fraud" period="Analisis terkini" contextText={caseCtx && window.STX_AI.buildContext(caseCtx.docText, 160000)} />
      </ChatDock>
    </div>
  );
}

function cannedReply(q, period) {

function App() {
  const D = window.STX_DATA;
  const [theme, setTheme] = React.useState("light");
  const [view, setView] = React.useState(() => {
    try {
      const q = new URLSearchParams(location.search);
      if (q.get("new")) return "newcase";
      if (q.get("app")) return "library";
      return "landing";
    } catch (e) { return "landing"; }
  });
  const [cases, setCases] = React.useState(D.cases);
  const [openCases, setOpenCases] = React.useState([]);
  const [activeCaseId, setActiveCaseId] = React.useState(null);
  const [dirtyIds, setDirtyIds] = React.useState({});
  const [pendingClose, setPendingClose] = React.useState(null);
  const [pendingDelete, setPendingDelete] = React.useState(null);
  const [jobs, setJobs] = React.useState({});
  const jobTimers = React.useRef({});
  const { Button, IconButton, Badge, Dialog } = NS;
  const activeCase = openCases.find((c) => c.id === activeCaseId) || null;

  // ---- Background analysis jobs (survive navigation) ----
  const jobKey = (caseId, agent) => caseId + ":" + agent;
  const setJob = (key, patch) => setJobs((j) => ({ ...j, [key]: Object.assign({}, j[key], patch) }));
  const startJob = (caseObj, agent) => {
    const key = jobKey(caseObj.id, agent);
    if (jobs[key] && jobs[key].status === "running") return;
    const AI = window.STX_AI;
    const ctx = window.STX_AI.buildContext(caseObj.docText);
    if (agent === "finance" || agent === "risk") {
      if (!AI || !AI.hasKey()) { setJob(key, { status: "error", error: "API Key Anthropic belum diatur. Buka Pengaturan → API Key.", progress: 0 }); return; }
      if (ctx.trim().length < 40) { setJob(key, { status: "error", error: "Unggah dokumen keuangan terlebih dahulu agar dapat dianalisis.", progress: 0 }); return; }
    }
    setJob(key, { status: "running", progress: 10, error: "" });
    clearInterval(jobTimers.current[key]);
    jobTimers.current[key] = setInterval(() => {
      setJobs((j) => { const cur = j[key] || {}; if (cur.status !== "running") return j; return { ...j, [key]: Object.assign({}, cur, { progress: Math.min(92, (cur.progress || 10) + 3) }) }; });
    }, 500);
    const finish = (patch) => { clearInterval(jobTimers.current[key]); setJob(key, patch); };
    if (agent === "finance" && AI) {
      AI.analyzeFinance({ company: caseObj.company, contextText: ctx })
        .then((result) => {
          caseObj.analysis = Object.assign({}, caseObj.analysis, { finance: result });
          if (!caseObj.agents.includes("finance")) caseObj.agents.push("finance");
          markDirty(caseObj.id);
          finish({ status: "done", progress: 100 });
        })
        .catch((e) => finish({ status: "error", progress: 0, error: "Analisis gagal: " + e.message }));
    } else if (agent === "risk" && AI) {
      AI.analyzeRisk({ company: caseObj.company, contextText: ctx })
        .then((result) => {
          caseObj.analysis = Object.assign({}, caseObj.analysis, { risk: result });
          if (!caseObj.agents.includes("risk")) caseObj.agents.push("risk");
          markDirty(caseObj.id);
          finish({ status: "done", progress: 100 });
        })
        .catch((e) => finish({ status: "error", progress: 0, error: "Analisis gagal: " + e.message }));
    } else {
      // agen contoh (transform): simulasi
      setTimeout(() => {
        if (!caseObj.agents.includes(agent)) caseObj.agents.push(agent);
        markDirty(caseObj.id);
        finish({ status: "done", progress: 100 });
      }, 2600);
    }
  };
  const clearJob = (key) => setJobs((j) => { const n = { ...j }; delete n[key]; return n; });

  React.useEffect(() => { document.getElementById("root").setAttribute("data-theme", theme); }, [theme]);
  const [user, setUser] = React.useState(() => (window.STX_AUTH ? window.STX_AUTH.currentUser() : { name: "Tamu", email: "" }));
  const casesRef = React.useRef(cases);
  React.useEffect(() => { casesRef.current = cases; }, [cases]);
  const persist = React.useCallback(() => { if (window.STX_STORE) window.STX_STORE.saveCases(casesRef.current); }, []);
  React.useEffect(() => {
    if (!window.STX_STORE) return;
    window.STX_STORE.loadCases().then((saved) => { if (saved && Array.isArray(saved) && saved.length) { casesRef.current = saved; setCases(saved); } });
  }, []);

  const nextIndex = (() => {
    let max = 0;
    (cases || []).forEach((c) => { const m = /Case-(\d+)-/.exec(c.id || ""); if (m) max = Math.max(max, parseInt(m[1], 10)); });
    return max + 1;
  })();
  const openCase = (c) => {
    setOpenCases((prev) => (prev.some((x) => x.id === c.id) ? prev : [...prev, c]));
    setActiveCaseId(c.id); setView("workspace");
  };
  const markDirty = (id) => { setDirtyIds((p) => ({ ...p, [id]: true })); persist(); };
  const saveCase = (id) => setDirtyIds((p) => ({ ...p, [id]: false }));
  const doClose = (id) => {
    setOpenCases((prev) => {
      const rest = prev.filter((c) => c.id !== id);
      if (id === activeCaseId) {
        if (rest.length) { setActiveCaseId(rest[rest.length - 1].id); setView("workspace"); }
        else { setActiveCaseId(null); setView("library"); }
      }
      return rest;
    });
    setDirtyIds((p) => { const n = { ...p }; delete n[id]; return n; });
  };
  const requestClose = (id) => { if (dirtyIds[id]) setPendingClose(id); else doClose(id); };
  const deleteCase = (id) => {
    const next = cases.filter((c) => c.id !== id);
    casesRef.current = next; setCases(next);
    setOpenCases((prev) => prev.filter((c) => c.id !== id));
    if (activeCaseId === id) { setActiveCaseId(null); setView("library"); }
    setDirtyIds((p) => { const n = { ...p }; delete n[id]; return n; });
    persist();
  };
  const selectCase = (id) => { setActiveCaseId(id); setView("workspace"); };
  const nav = (v) => setView(v);

  const Ic = ({ n, s = 16 }) => <Icon n={n} s={s} />;

  // Header config per view
  let title = "Pustaka Case", subtitle = `${cases.length} case tersimpan`, actions = null, onBack = null;
  if (view === "newcase") { title = "Case Baru"; subtitle = "Buat analisis perusahaan baru"; onBack = () => setView("library"); }
  else if (view === "workspace" && activeCase) { title = activeCase.name; subtitle = activeCase.id; }
  else if (view.startsWith("agent-") && activeCase) {
    const a = D.agents.find((x) => x.id === view.slice(6));
    title = a.name; subtitle = `${activeCase.company} · ${activeCase.id}`; onBack = () => setView("workspace");
  }
  else if (view === "settings") { title = "Pengaturan"; subtitle = "Model AI, akun & ekspor"; }
  else if (view === "library") { actions = <Button variant="primary" size="sm" iconLeft={<Ic n="plus" s={15} />} onClick={() => setView("newcase")}>Case Baru</Button>; }

  let content;
  if (view === "library") content = <CaseLibrary cases={cases} onOpen={openCase} onNew={() => setView("newcase")} onDelete={(c) => setPendingDelete(c)} />;
  else if (view === "newcase") content = <NewCaseFlow nextIndex={nextIndex} onCancel={() => setView("library")} onCreate={(c) => { const next = [c, ...cases]; casesRef.current = next; setCases(next); openCase(c); persist(); }} />;
  else if (view === "workspace" && activeCase) content = <CaseWorkspace caseCtx={activeCase} docs={D.documents} agents={D.agents} dirty={!!dirtyIds[activeCaseId]} jobs={jobs} onStartJob={startJob} onClearJob={clearJob} onMarkDirty={() => markDirty(activeCaseId)} onSave={() => saveCase(activeCaseId)} onRequestClose={() => requestClose(activeCaseId)} onRunAgent={(id) => { setView("agent-" + id); }} />;
  else if (view === "agent-finance" && activeCase) content = <AgentFinance d={(activeCase.analysis && activeCase.analysis.finance) || D.finance} caseCtx={activeCase} onGenerateReview={(periodLabel, periodKey) => {
    const AI = window.STX_AI; const cObj = activeCase;
    const ctx = window.STX_AI.buildContext(cObj.docText);
    return AI.analyzeFinanceReview({ company: cObj.company, contextText: ctx, periodLabel }).then((review) => {
      const base = (cObj.analysis && cObj.analysis.finance) || (window.STX_DATA && window.STX_DATA.finance) || {}; const fin = Object.assign({}, base);
      fin.reviewsByPeriod = Object.assign({}, fin.reviewsByPeriod, { [periodKey]: review });
      cObj.analysis = Object.assign({}, cObj.analysis, { finance: fin });
      markDirty(cObj.id);
      return review;
    });
  }} />;
  else if (view === "agent-risk" && activeCase) content = <AgentRisk d={(activeCase.analysis && activeCase.analysis.risk) || D.risk} caseCtx={activeCase} />;
  else if (view === "agent-transform" && activeCase) content = <AgentTransform d={D.transform} caseCtx={activeCase} />;
  else if (view === "settings") content = <Settings user={user} onUpdateUser={setUser} />;
  else content = <CaseLibrary cases={cases} onOpen={openCase} onNew={() => setView("newcase")} onDelete={(c) => setPendingDelete(c)} />;

  if (!user) return <AuthScreen onAuth={setUser} />;
  if (view === "landing") {
    return <LandingScreen onContinue={() => setView("library")} onNew={() => setView("newcase")} user={user} onLogout={() => { if (window.STX_AUTH) window.STX_AUTH.logout(); setUser(null); setView("landing"); }} />;
  }

  const pc = pendingClose ? openCases.find((c) => c.id === pendingClose) : null;

  return (
    <React.Fragment>
      <AppShell active={view} onNav={nav} user={user}
        openCases={openCases} activeCaseId={activeCaseId} dirtyIds={dirtyIds} jobs={jobs}
        onSelectCase={selectCase} onCloseCase={requestClose}
        theme={theme} onToggleTheme={() => setTheme(theme === "light" ? "dark" : "light")}
        title={title} subtitle={subtitle} actions={actions} onBack={onBack}>
        {content}
      </AppShell>
      <Dialog open={!!pendingClose} onClose={() => setPendingClose(null)} title="Perubahan belum disimpan"
        description={pc ? `Case ${pc.id} memiliki perubahan yang belum disimpan. Apa yang ingin dilakukan?` : ""} width={460}
        footer={<React.Fragment>
          <Button variant="ghost" onClick={() => setPendingClose(null)}>Batal</Button>
          <Button variant="secondary" onClick={() => { const id = pendingClose; setPendingClose(null); doClose(id); }}>Tutup tanpa simpan</Button>
          <Button variant="primary" iconLeft={<Ic n="save" s={15} />} onClick={() => { const id = pendingClose; saveCase(id); setPendingClose(null); doClose(id); }}>Simpan &amp; tutup</Button>
        </React.Fragment>} />
      <Dialog open={!!pendingDelete} onClose={() => setPendingDelete(null)} title="Hapus case?"
        description={pendingDelete ? `${pendingDelete.company} · ${pendingDelete.id}` : ""} width={460}
        footer={<React.Fragment>
          <Button variant="ghost" onClick={() => setPendingDelete(null)}>Batal</Button>
          <Button variant="primary" iconLeft={<Ic n="trash-2" s={15} />} onClick={() => { const id = pendingDelete.id; setPendingDelete(null); deleteCase(id); }}>Hapus permanen</Button>
        </React.Fragment>}>
        <div style={{ fontSize: 14, color: "var(--text-body)", lineHeight: 1.6 }}>Case ini beserta seluruh dokumen dan hasil analisis yang tersimpan akan dihapus permanen dari perangkat ini. Tindakan ini tidak dapat dibatalkan.</div>
      </Dialog>
    </React.Fragment>
  );
}

const start = () => {
  if (!window.CaseLibrary || !window.AppShell || !window.Settings || !window.LandingScreen || !window.AuthScreen || !window.ChatPanel) return setTimeout(start, 30);
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
};
start();
</script>
</body>
</html>
