        <p className="lp-lede">Satu ruang kerja untuk menilai keuangan, mengulas risiko &amp; fraud, dan menyusun rencana transformasi lima tahun — berdasarkan dokumen dan data.</p>

        <div className="lp-choices">
          <div className="lp-choice lp-secondary" role="button" tabIndex={0} onClick={onContinue}>
            <div className="lp-ic"><Icon n="folder-open" s={24} /></div>
            <h3>Lanjutkan Case</h3>
            <p>Buka kembali analisis yang sudah ada di Pustaka Case Anda dan lanjutkan pekerjaan.</p>
            <div className="lp-meta">
              <span>Lanjutkan dari analisis terakhir Anda</span>

            <span className="lp-cta">Buka Pustaka Case <Icon n="arrow-right" s={16} /></span>

          <div className="lp-choice lp-primary" role="button" tabIndex={0} onClick={onNew}>

            <h3>Buat Case Baru</h3>

            <div className="lp-meta">
              <Icon n="sparkles" s={15} />
              <span>Isi Data Primer otomatis via AI dari dokumen atau website</span>

function AuthScreen({ onAuth }) {
  const [mode, setMode] = React.useState("login");
  const [name, setName] = React.useState("");
  const [email, setEmail] = React.useState("");
  const [pass, setPass] = React.useState("");
  const [err, setErr] = React.useState("");
  React.useEffect(() => {
    if (!document.getElementById("lp-style")) {
      const st = document.createElement("style"); st.id = "lp-style"; st.textContent = LP_CSS; document.head.appendChild(st);
    }
    refreshIcons();
  });
  const logo = (window.__resources && window.__resources.logoOnDark) || "./assets/stratix-logo-light.png";
  const submit = () => {
    setErr("");
    try {
      const A = window.STX_AUTH;
      const u = mode === "login" ? A.login(email, pass) : A.signup(name, email, pass);
      onAuth(u);
    } catch (e) { setErr((e && e.message) || String(e)); }
  };
  const inp = { width: "100%", height: 44, borderRadius: 10, border: "1px solid rgba(255,255,255,.16)", background: "rgba(255,255,255,.06)", color: "#fff", padding: "0 14px", fontSize: 14, fontFamily: "var(--font-sans)", outline: "none", marginBottom: 12, boxSizing: "border-box" };
  return (
    <div className="lp-stage" style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div className="lp-decor"><div className="lp-grid" /><div className="lp-bladeline" /></div>
      <div style={{ position: "relative", zIndex: 2, width: 420, maxWidth: "92vw", background: "rgba(10,22,44,.72)", backdropFilter: "blur(10px)", WebkitBackdropFilter: "blur(10px)", border: "1px solid rgba(255,255,255,.1)", borderRadius: 20, padding: "34px 30px", boxShadow: "0 24px 70px rgba(0,0,0,.42)" }}>
        <img src={logo} alt="STRATIX" style={{ height: 30, marginBottom: 22 }} />
        <div style={{ fontSize: 20, fontWeight: 800, color: "#fff", marginBottom: 4 }}>{mode === "login" ? "Masuk ke STRATIX" : "Buat Akun STRATIX"}</div>
        <div style={{ fontSize: 13, color: "rgba(255,255,255,.6)", marginBottom: 20 }}>Ruang kerja konsultan AI Anda.</div>
        {mode === "signup" && <input style={inp} placeholder="Nama" value={name} onChange={(e) => setName(e.target.value)} />}
        <input style={inp} type="email" placeholder="Email" value={email} onChange={(e) => setEmail(e.target.value)} />
        <input style={inp} type="password" placeholder="Kata sandi" value={pass} onChange={(e) => setPass(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()} />
        {err ? <div style={{ fontSize: 12.5, color: "#FCA5A5", marginBottom: 12, display: "flex", gap: 6, alignItems: "center" }}><Icon n="alert-circle" s={14} /> {err}</div> : null}
        <button onClick={submit} style={{ width: "100%", height: 46, borderRadius: 11, border: "none", background: "var(--grad-blade, linear-gradient(120deg,#12A3B4,#0E7C8B))", color: "#fff", fontSize: 14.5, fontWeight: 700, cursor: "pointer", fontFamily: "var(--font-sans)" }}>
          {mode === "login" ? "Masuk" : "Daftar"}
        </button>
        <div style={{ fontSize: 12.5, color: "rgba(255,255,255,.6)", marginTop: 16, textAlign: "center" }}>
          {mode === "login" ? "Belum punya akun? " : "Sudah punya akun? "}
          <a href="#" onClick={(e) => { e.preventDefault(); setErr(""); setMode(mode === "login" ? "signup" : "login"); }} style={{ color: "#4FD1C5", fontWeight: 700 }}>{mode === "login" ? "Daftar" : "Masuk"}</a>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { LandingScreen, AuthScreen });

<script type="text/babel" data-file="shared.jsx">
/* global React */
const { StatCard, Badge, IconButton, Tooltip, Button } = window.STRATIXDesignSystem_72cbdd;

/* React-owned Lucide icon: builds an inline <svg> from lucide.icons and injects it
   into a span via ref. React only manages the span (no JSX children), so re-renders
   never touch the SVG internals — no removeChild crashes. */
function lucideSvg(name, size) {
  const L = window.lucide;
  if (!L || !L.icons) return "";
  const pascal = String(name).replace(/(^|-)([a-z0-9])/g, (_, __, c) => c.toUpperCase());
  const node = L.icons[pascal];
  if (!node) return "";
  const body = (node[2] || []).map(([tag, attrs]) =>
    `<${tag} ${Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(" ")}></${tag}>`
  ).join("");
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${body}</svg>`;
}
function Icon({ n, s = 18, style = {} }) {
  const ref = React.useRef(null);
  React.useEffect(() => { if (ref.current) ref.current.innerHTML = lucideSvg(n, s); }, [n, s]);
  return <span ref={ref} style={{ display: "inline-flex", width: s, height: s, ...style }} />;
}
function refreshIcons() { /* no-op: icons are React-owned inline SVG now */ }

/* Company mark — colored rounded square with initials */
function CompanyMark({ initials, color, size = 40, radius = 10 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: radius, flexShrink: 0,
      background: color, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center",
      fontWeight: 800, fontSize: size * 0.36, letterSpacing: "-0.01em",
      boxShadow: "inset 0 0 0 1px rgba(255,255,255,0.14)",
    }}>{initials}</div>
  );
}

/* ---------- App shell ---------- */
function AppShell({ active, onNav, openCases = [], activeCaseId, dirtyIds = {}, jobs = {}, onSelectCase, onCloseCase, theme, onToggleTheme, children, title, subtitle, actions, onBack, user, onOpenAccount }) {
  const nav = [
    { id: "library", label: "Pustaka Case", icon: "folders" },
    { id: "workspace", label: "Ruang Kerja", icon: "layout-panel-left", disabled: !activeCaseId },
    { id: "settings", label: "Pengaturan", icon: "settings" },
  ];
  React.useEffect(refreshIcons);
  return (
    <div style={{ display: "flex", height: "100%", background: "var(--bg-app)", color: "var(--text-body)" }}>
      {/* Sidebar */}
      <aside style={{
        width: "var(--sidebar-w)", flexShrink: 0, background: "var(--surface)",
        borderRight: "1px solid var(--border)", display: "flex", flexDirection: "column",
      }}>
        <div style={{ height: "var(--topbar-h)", display: "flex", alignItems: "center", padding: "0 18px", borderBottom: "1px solid var(--border-subtle)" }}>
          <img src={theme === "dark" ? ((window.__resources && window.__resources.logoOnDark) || "./assets/stratix-logo-light.png") : ((window.__resources && window.__resources.logoOnLight) || "./assets/stratix-logo.png")} alt="STRATIX" style={{ height: 40, width: "auto" }} />
        </div>
        <div style={{ padding: "14px 12px", flex: 1, overflowY: "auto" }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--text-faint)", padding: "6px 10px 8px" }}>Navigasi</div>
          {nav.map((n) => (
            <button key={n.id} onClick={() => !n.disabled && onNav(n.id)} disabled={n.disabled}
              style={{
                width: "100%", display: "flex", alignItems: "center", gap: 11, height: 40, padding: "0 10px",
                border: "none", borderRadius: "var(--radius-md)", marginBottom: 2, cursor: n.disabled ? "not-allowed" : "pointer",
                fontFamily: "var(--font-sans)", fontSize: "var(--text-md)", fontWeight: 600, textAlign: "left",
                color: active === n.id ? "var(--text-strong)" : n.disabled ? "var(--text-faint)" : "var(--text-muted)",
                background: active === n.id ? "var(--accent-quiet)" : "transparent",
                boxShadow: active === n.id ? "inset 3px 0 0 var(--accent)" : "none",
                opacity: n.disabled ? 0.6 : 1,
              }}>
              <Icon n={n.icon} s={18} style={{ color: active === n.id ? "var(--accent)" : "currentColor" }} />
              {n.label}
            </button>
          ))}

          {openCases.length > 0 && (
            <div style={{ marginTop: 18 }}>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--text-faint)", padding: "6px 10px 8px" }}>Case Aktif ({openCases.length})</div>
              {openCases.map((c) => {
                const on = c.id === activeCaseId;
                return (
                  <div key={c.id} style={{ marginBottom: 4 }}>
                    <div onClick={() => onSelectCase(c.id)} style={{ display: "flex", gap: 9, alignItems: "center", padding: "8px 8px 8px 10px", background: on ? "var(--accent-quiet)" : "var(--bg-subtle)", borderRadius: "var(--radius-md)", cursor: "pointer", boxShadow: on ? "inset 3px 0 0 var(--accent)" : "none" }}>
                      {c.logo
                        ? <img src={c.logo} alt="" style={{ width: 30, height: 30, borderRadius: 7, objectFit: "contain", background: "#fff", border: "1px solid var(--border)", padding: 2, flexShrink: 0 }} />
                        : <CompanyMark initials={c.initials} color={c.logoColor} size={30} radius={7} />}
                      <div style={{ minWidth: 0, flex: 1 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                          <span style={{ fontSize: 12.5, fontWeight: 700, color: "var(--text-strong)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{c.company}</span>
                          {dirtyIds[c.id] && <span title="Belum disimpan" style={{ width: 6, height: 6, borderRadius: 999, background: "var(--warning-500)", flexShrink: 0 }} />}
                        </div>
                        <div style={{ fontFamily: "var(--font-mono)", fontSize: 10.5, color: "var(--text-muted)" }}>{c.id}</div>
                      </div>
                      <button onClick={(e) => { e.stopPropagation(); onCloseCase(c.id); }} title="Tutup case" aria-label="Tutup case"
                        style={{ width: 22, height: 22, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", border: "none", borderRadius: 6, background: "transparent", color: "var(--text-faint)", cursor: "pointer" }}
                        onMouseEnter={(e) => { e.currentTarget.style.background = "var(--negative-050)"; e.currentTarget.style.color = "var(--negative-600)"; }}
                        onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "var(--text-faint)"; }}>
                        <Icon n="x" s={13} />
                      </button>
                    </div>
                    {on && (
                      <div style={{ display: "flex", flexDirection: "column", gap: 1, marginTop: 4, marginLeft: 6 }}>
                        {[["finance", "Analis Keuangan", "line-chart"], ["risk", "Risiko & Fraud", "shield-alert"], ["transform", "Transformasi", "git-branch"]].map(([id, label, icon]) => {
                          const ran = (c.agents || []).includes(id);
                          const job = jobs[c.id + ":" + id] || {};
                          const busy = job.status === "running";
                          const sel = active === "agent-" + id;
                          const clickable = ran || busy;
                          return (
                            <button key={id} onClick={() => clickable && onNav("agent-" + id)} disabled={!clickable} title={clickable ? label : label + " — belum dijalankan"}
                              style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, height: 32, padding: "0 10px", border: "none", background: sel ? "var(--accent-quiet)" : "transparent", borderRadius: "var(--radius-sm)", cursor: clickable ? "pointer" : "not-allowed", fontFamily: "var(--font-sans)", fontSize: 13, fontWeight: 500, color: !clickable ? "var(--text-faint)" : sel ? "var(--text-strong)" : "var(--text-muted)", opacity: clickable ? 1 : 0.55, textAlign: "left" }}>
                              <Icon n={icon} s={15} />
                              <span style={{ flex: 1 }}>{label}</span>
                              {busy && <span title="Analisis berjalan" style={{ width: 12, height: 12, borderRadius: "50%", border: "2px solid var(--accent)", borderTopColor: "transparent", display: "inline-block", animation: "stx-spin 0.7s linear infinite", flexShrink: 0 }} />}
                              {!busy && ran && <span style={{ width: 6, height: 6, borderRadius: 999, background: "var(--positive-500)", flexShrink: 0 }} />}

            {user && user.avatar ? (

            ) : (

/* ---------- Lightweight charts (SVG, data-viz) ---------- */
function LineChart({ series, labels, height = 150, color = "var(--teal-500)", fill = true, area2 }) {
  const w = 520, h = height, pad = 8;
  const all = area2 ? series.concat(area2) : series;
  const max = Math.max(...all) * 1.08, min = Math.min(...all) * 0.9;
  const x = (i, arr) => pad + (i * (w - pad * 2)) / (arr.length - 1);
  const y = (v) => h - pad - ((v - min) / (max - min)) * (h - pad * 2 - 16);
  const path = (arr) => arr.map((v, i) => `${i ? "L" : "M"}${x(i, arr).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const areaPath = `${path(series)} L${x(series.length - 1, series)},${h - pad} L${x(0, series)},${h - pad} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={height} preserveAspectRatio="none" style={{ overflow: "hidden" }}>
      <defs>
        <linearGradient id="stx-area" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.22" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      {[0.25, 0.5, 0.75].map((g) => <line key={g} x1={pad} x2={w - pad} y1={pad + g * (h - pad * 2)} y2={pad + g * (h - pad * 2)} stroke="var(--data-grid)" strokeWidth="1" />)}
      {fill && <path d={areaPath} fill="url(#stx-area)" />}
      {area2 && <path d={path(area2)} fill="none" stroke="var(--slate-400)" strokeWidth="2" strokeDasharray="4 4" />}
      <path d={path(series)} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
      {series.map((v, i) => <circle key={i} cx={x(i, series)} cy={y(v)} r="3.2" fill="var(--surface)" stroke={color} strokeWidth="2" />)}
    </svg>
  );
}

function BarChart({ series, labels, height = 150, color = "var(--navy-700)" }) {
  const max = Math.max(...series) * 1.1;

/* ============ Interactive multi-series chart (line/bar, dual-axis, labels) ============ */
const LINE_METRICS = [

  ["laba_bersih", "Laba Tahun Berjalan", "Rp M"], ["ebitda", "EBITDA", "Rp M"], ["total_aset", "Total Aset", "Rp M"],

  ["total_liabilitas", "Total Liabilitas", "Rp M"], ["liabilitas_pendek", "Liabilitas Jangka Pendek", "Rp M"],

  ["kas_investasi", "Kas Bersih Investasi", "Rp M"], ["kas_pendanaan", "Kas Bersih Pendanaan", "Rp M"],
];
const BAR_METRICS = [
  ["gross_margin", "Gross Margin", "%"], ["ebitda_margin", "EBITDA Margin", "%"],
  ["current_ratio", "Current Ratio", "%"], ["cash_ratio", "Cash Ratio", "%"],

];
function fmtID(n, dec) { return Number(n).toLocaleString("id-ID", { minimumFractionDigits: dec, maximumFractionDigits: dec }); }
function fmtChartNum(v, unit) {
  if (v == null || isNaN(v)) return "—";
  if (unit === "%") return fmtID(v, 1) + "%";
  if (unit === "×") return fmtID(v, 2) + "×";
  const a = Math.abs(v); // nilai dalam Miliar
  if (a >= 1000) return fmtID(v / 1000, 2) + " T";
  if (a >= 1) return fmtID(v, 2) + " M";
  if (a >= 0.001) return fmtID(v * 1000, 2) + " Jt";
  if (a > 0) return fmtID(v * 1e6, 2) + " Rb";
  return "0";
}
function maxAbs(arr) { const n = arr.filter((x) => x != null && !isNaN(x)); return n.length ? Math.max(...n.map(Math.abs)) : 0; }
function scaleOf(vals) {
  const n = vals.filter((x) => x != null && !isNaN(x));
  let min = Math.min(0, ...n), max = Math.max(0, ...n);
  if (min === max) { max += 1; min -= 1; }
  const p = (max - min) * 0.12; return { min: min - p, max: max + p };
}
function barScale(vals) {
  const n = vals.filter((x) => x != null && !isNaN(x));
  let dMin = n.length ? Math.min(...n) : 0, dMax = n.length ? Math.max(...n) : 1;
  let min = Math.min(0, dMin), max = Math.max(0, dMax);
  if (min === max) max += 1;
  const range = (max - min) || 1;
  max += range * 0.16; // ruang label di atas
  if (min < 0) min -= range * 0.16; // pad bawah hanya bila ada negatif → bar positif mendarat di sumbu
  return { min: min, max: max };
}

function MultiChart({ mode, catalog, data, labels, range, defaultKey, height = 220 }) {

  const B = b !== "none" ? { key: b, label: meta(b)[1], unit: meta(b)[2], v: vals(b), color: "var(--navy-500)" } : null;
  const hasA = A.v.some((x) => x != null);
  const dual = B && (A.unit !== B.unit || (maxAbs(A.v) && maxAbs(B.v) && (maxAbs(B.v) / maxAbs(A.v) > 8 || maxAbs(A.v) / maxAbs(B.v) > 8)));
  const scaleFn = mode === "bar" ? barScale : scaleOf;
  const sL = scaleFn(dual ? A.v : (B ? A.v.concat(B.v) : A.v));

  const W = 640, H = height, padL = mode === "bar" ? 26 : 14, padR = mode === "bar" ? 26 : 14, padT = 30, padB = 34;
  const plotW = W - padL - padR, plotH = H - padT - padB, n = yrs.length;
  const xAt = (i) => padL + (n <= 1 ? plotW / 2 : (i * plotW) / (n - 1));
  const yOf = (v, s) => padT + plotH - ((v - s.min) / (s.max - s.min)) * plotH;
  const labelY = (i, which) => {
    const yA = A.v[i] != null ? yOf(A.v[i], sL) : null;
    const yB = (B && B.v[i] != null) ? yOf(B.v[i], sR) : null;
    if (which === "A") { if (yA == null) return 0; if (yB == null) return yA - 11; return yA <= yB ? yA - 11 : yA + 18; }

              {A.v.map((v, i) => v == null ? null : <text key={"at" + i} x={bx(i) - (B ? barW / 2 + 1 : 0)} y={v >= 0 ? yOf(v, sL) - 7 : yOf(v, sL) + 16} textAnchor="middle" fontSize="13" fontWeight="700" fontFamily="var(--font-mono)" fill={A.color}>{fmtChartNum(v, A.unit)}</text>)}

              {B ? B.v.map((v, i) => v == null ? null : <circle key={"bc" + i} cx={xAt(i)} cy={yOf(v, sR)} r="3.4" fill="var(--surface)" stroke={B.color} strokeWidth="2" />) : null}
              {B ? B.v.map((v, i) => v == null ? null : <text key={"bl" + i} x={lblX(i)} y={labelY(i, "B")} textAnchor={lblAnchor(i)} fontSize="13" fontWeight="700" fontFamily="var(--font-mono)" fill={B.color}>{fmtChartNum(v, B.unit)}</text>) : null}

        <span key={a} title={a} style={{ width: 24, height: 24, borderRadius: 6, background: "var(--bg-subtle)", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--text-muted)" }}>
          <Icon n={a === "finance" ? "line-chart" : a === "risk" ? "shield-alert" : "git-branch"} s={13} />
        </span>
      )) : <span style={{ fontSize: 12, color: "var(--text-faint)" }}>—</span>}
    </div>
  );

  const cell = { padding: "12px 16px", borderBottom: "1px solid var(--border-subtle)", whiteSpace: "nowrap", verticalAlign: "middle" };

  return (
    <div>
      <div style={{ display: "flex", gap: 12, marginBottom: 22, alignItems: "center" }}>
        <div style={{ flex: 1, maxWidth: 340 }}>
          <Input value={query} onChange={(e) => setQuery(e.target.value)} prefix={<Icon n="search" s={15} />} placeholder="Cari case atau perusahaan…"
            suffix={query ? <button onClick={() => setQuery("")} title="Bersihkan" aria-label="Bersihkan pencarian" style={{ border: "none", background: "transparent", cursor: "pointer", color: "var(--text-faint)", display: "inline-flex", padding: 0 }}><Icon n="x" s={14} /></button> : null} />
        </div>
        <div style={{ flex: 1 }} />
        {/* Toggle tabel / card */}
        <div style={{ display: "flex", padding: 3, background: "var(--bg-subtle)", borderRadius: "var(--radius-md)", gap: 2 }}>
          {[["table", "table-2", "Tabel"], ["card", "layout-grid", "Kartu"]].map(([m, ic, lbl]) => (
            <button key={m} onClick={() => setView(m)} title={lbl} aria-label={lbl} style={{
              width: 36, height: 30, border: "none", borderRadius: "var(--radius-sm)", cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
              background: view === m ? "var(--surface)" : "transparent",
              color: view === m ? "var(--accent-hover)" : "var(--text-muted)",
              boxShadow: view === m ? "var(--shadow-xs)" : "none",
              transition: "all var(--dur-fast) var(--ease-standard)",
            }}><Icon n={ic} s={16} /></button>
          ))}
        </div>
        <div style={{ position: "relative" }}>
          <Button variant="secondary" iconLeft={<Icon n="sliders-horizontal" s={16} />} onClick={() => setFilterOpen((o) => !o)}>
            Filter{activeFilters > 0 ? <span style={{ marginLeft: 7, fontSize: 11, fontWeight: 700, background: "var(--accent)", color: "#fff", borderRadius: 999, padding: "1px 7px" }}>{activeFilters}</span> : null}
          </Button>
          {filterOpen && (
            <React.Fragment>
              <div onClick={() => setFilterOpen(false)} style={{ position: "fixed", inset: 0, zIndex: 40 }} />
              <div style={{ position: "absolute", top: "calc(100% + 8px)", right: 0, zIndex: 41, width: 288, background: "var(--surface)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", boxShadow: "var(--shadow-lg)", padding: 16 }}>
                <FilterGroup label="Status Perusahaan" value={fStatus} options={statusOpts} onPick={setFStatus} />
                <FilterGroup label="Kesehatan" value={fHealth} options={healthOpts} onPick={setFHealth} />
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 14, paddingTop: 12, borderTop: "1px solid var(--border-subtle)" }}>
                  <button onClick={() => { setFStatus("all"); setFHealth("all"); }} style={{ border: "none", background: "transparent", cursor: "pointer", fontSize: 12.5, fontWeight: 600, color: "var(--text-muted)" }}>Reset</button>
                  <Button variant="primary" size="sm" onClick={() => setFilterOpen(false)}>Terapkan</Button>
                </div>
              </div>
            </React.Fragment>
          )}
        </div>
      </div>

      {/* ---- EMPTY STATE ---- */}
      {cases.length === 0 && view === "table" && (
        <div style={{ border: "1px dashed var(--border-strong)", borderRadius: "var(--radius-lg)", background: "var(--surface)", padding: "56px 24px", textAlign: "center" }}>
          <div style={{ width: 56, height: 56, borderRadius: 14, background: "var(--grad-blade)", color: "#fff", display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 16 }}><Icon n="folder-open" s={26} /></div>
          <div style={{ fontSize: 16, fontWeight: 700, color: "var(--text-strong)" }}>Belum ada case</div>
          <div style={{ fontSize: 13, color: "var(--text-muted)", marginTop: 6, maxWidth: 380, marginLeft: "auto", marginRight: "auto", lineHeight: 1.5 }}>Mulai dengan membuat case baru untuk menganalisis kesehatan sebuah perusahaan.</div>
          <div style={{ marginTop: 18 }}><Button variant="primary" iconLeft={<Icon n="plus" s={16} />} onClick={onNew}>Mulai Case Baru</Button></div>
        </div>
      )}

      {/* ---- TABEL (default) ---- */}
      {cases.length > 0 && view === "table" && (
        <div style={{ border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", overflow: "hidden", overflowX: "auto", background: "var(--surface)" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "var(--text-sm)" }}>
            <thead>
              <tr>
                {["Perusahaan", "Sektor", "Status", "Revenue", "Skor Kesehatan", "Indeks Risiko", "Agen", ""].map((h, i) => (
                  <th key={i} style={{
                    textAlign: ["Revenue", "Skor Kesehatan", "Indeks Risiko"].includes(h) ? "right" : "left", padding: "11px 16px", whiteSpace: "nowrap",
                    fontSize: "var(--text-xs)", fontWeight: 700, letterSpacing: "var(--ls-wide)", textTransform: "uppercase",
                    color: "var(--text-muted)", background: "var(--bg-subtle)", borderBottom: "1px solid var(--border)",
                  }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {noResults && (
                <tr><td colSpan={8} style={{ padding: "40px 16px", textAlign: "center", color: "var(--text-muted)", fontSize: 13 }}>Tidak ada case yang cocok dengan pencarian atau filter.</td></tr>
              )}
              {filtered.map((c) => (
                <tr key={c.id} onClick={() => onOpen(c)} style={{ cursor: "pointer", transition: "background var(--dur-fast) var(--ease-standard)" }}
                  onMouseEnter={(e) => { e.currentTarget.style.background = "var(--surface-sunken)"; }}
                  onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}>
                  <td style={cell}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <CaseLogo c={c} size={38} radius={9} />
                      <div>
                        <div style={{ fontSize: 14, fontWeight: 700, color: "var(--text-strong)", letterSpacing: "-0.01em" }}>{c.company}</div>
                        <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-muted)" }}>{c.id}</div>
                      </div>
                    </div>
                  </td>
                  <td style={{ ...cell, color: "var(--text-body)" }}>{c.sector}</td>
                  <td style={cell}><Badge tone="brand" size="sm">{c.status}</Badge></td>
                  <td style={{ ...cell, textAlign: "right" }}><span style={{ fontFamily: "var(--font-mono)", fontWeight: 600, color: "var(--text-strong)" }}>{c.revenue}</span></td>
                  <td style={{ ...cell, textAlign: "right" }}><ScorePill v={finScore(c)} color={healthColor(finScore(c))} /></td>
                  <td style={{ ...cell, textAlign: "right" }}><ScorePill v={rskScore(c)} color={riskColor(rskScore(c), rskLevel(c))} /></td>
                  <td style={cell}><AgentDots agents={c.agents} /></td>
                  <td style={{ ...cell, textAlign: "right", whiteSpace: "nowrap" }}>
                    <button onClick={(e) => { e.stopPropagation(); onDelete && onDelete(c); }} title="Hapus case" aria-label="Hapus case"
                      style={{ border: "none", background: "transparent", cursor: "pointer", color: "var(--text-faint)", padding: 4, marginRight: 6, display: "inline-flex", verticalAlign: "middle", borderRadius: 6 }}
                      onMouseEnter={(e) => { e.currentTarget.style.color = "var(--negative-600)"; }}
                      onMouseLeave={(e) => { e.currentTarget.style.color = "var(--text-faint)"; }}><Icon n="trash-2" s={15} /></button>
                    <Icon n="chevron-right" s={16} style={{ color: "var(--text-faint)", verticalAlign: "middle" }} />
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* ---- KARTU ---- */}
      {view === "card" && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 16 }}>
          <button onClick={onNew} style={{
            minHeight: 168, border: "1.5px dashed var(--border-strong)", borderRadius: "var(--radius-lg)",
            background: "transparent", cursor: "pointer", display: "flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center", gap: 10, color: "var(--text-muted)",
            fontFamily: "var(--font-sans)", transition: "all var(--dur-base) var(--ease-standard)",
          }}
            onMouseEnter={(e) => { e.currentTarget.style.borderColor = "var(--accent)"; e.currentTarget.style.color = "var(--accent-hover)"; e.currentTarget.style.background = "var(--accent-quiet)"; }}
            onMouseLeave={(e) => { e.currentTarget.style.borderColor = "var(--border-strong)"; e.currentTarget.style.color = "var(--text-muted)"; e.currentTarget.style.background = "transparent"; }}>
            <div style={{ width: 44, height: 44, borderRadius: 12, background: "var(--grad-blade)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center" }}><Icon n="plus" s={22} /></div>
            <span style={{ fontWeight: 600, fontSize: 14 }}>Mulai Case Baru</span>
            <span style={{ fontSize: 12 }}>Analisis perusahaan baru</span>
          </button>

          {noResults && (
            <div style={{ gridColumn: "1/-1", padding: "36px 16px", textAlign: "center", color: "var(--text-muted)", fontSize: 13 }}>Tidak ada case yang cocok dengan pencarian atau filter.</div>
          )}
          {filtered.map((c) => (
            <Card key={c.id} interactive onClick={() => onOpen(c)} padding="none" style={{ overflow: "hidden" }}>
              <div style={{ padding: 18 }}>
                <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 10 }}>
                  <CaseLogo c={c} size={44} radius={11} />
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <button onClick={(e) => { e.stopPropagation(); onDelete && onDelete(c); }} title="Hapus case" aria-label="Hapus case"
                      style={{ border: "none", background: "transparent", cursor: "pointer", color: "var(--text-faint)", padding: 4, display: "inline-flex", borderRadius: 6 }}
                      onMouseEnter={(e) => { e.currentTarget.style.color = "var(--negative-600)"; }}
                      onMouseLeave={(e) => { e.currentTarget.style.color = "var(--text-faint)"; }}><Icon n="trash-2" s={15} /></button>
                  </div>
                </div>
                <div style={{ marginTop: 14 }}>
                  <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-muted)", letterSpacing: "0.02em" }}>{c.id}</div>
                  <div style={{ fontSize: 15, fontWeight: 700, color: "var(--text-strong)", marginTop: 3, letterSpacing: "-0.01em", lineHeight: 1.25 }}>{c.company}</div>
                </div>
                <div style={{ display: "flex", gap: 6, marginTop: 12, flexWrap: "wrap" }}>
                  <Badge tone="neutral" size="sm">{c.sector}</Badge>
                  <Badge tone="brand" size="sm">{c.status}</Badge>
                </div>
                <div style={{ display: "flex", gap: 20, marginTop: 14 }}>
                  <div>
                    <div style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.04em", color: "var(--text-faint)", marginBottom: 3 }}>Skor Kesehatan</div>
                    <ScorePill v={finScore(c)} color={healthColor(finScore(c))} align="flex-start" />
                  </div>
                  <div>
                    <div style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.04em", color: "var(--text-faint)", marginBottom: 3 }}>Indeks Risiko</div>
                    <ScorePill v={rskScore(c)} color={riskColor(rskScore(c), rskLevel(c))} align="flex-start" />
                  </div>
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "11px 18px", borderTop: "1px solid var(--border-subtle)", background: "var(--surface-sunken)" }}>
                <div>
                  <span style={{ fontFamily: "var(--font-mono)", fontSize: 14, fontWeight: 600, color: "var(--text-strong)" }}>{c.revenue}</span>
                  <span style={{ fontSize: 11, color: "var(--text-faint)", marginLeft: 6 }}>revenue</span>
                </div>
                <AgentDots agents={c.agents} />
              </div>
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}

/* ---------- New Case: name + Data Primer ---------- */
function NewCaseFlow({ nextIndex, onCancel, onCreate }) {
  const { Card, Input, Select, Button, Badge, Textarea, Alert, Switch } = LibNS;
  const [step, setStep] = React.useState(1);
  const [company, setCompany] = React.useState("");
  const [autofilled, setAutofilled] = React.useState(false);
  const [filling, setFilling] = React.useState(false);
  const [form, setForm] = React.useState({ founded: "", sector: "", bidang: "", revenue: "", revenueDate: "", status: "", website: "", logo: null });
  const [primerDocs, setPrimerDocs] = React.useState([]);
  const [afErr, setAfErr] = React.useState("");
  const AI = window.STX_AI;
  const primerFileRef = React.useRef(null);
  const onPrimerDocs = async (e) => {
    const files = [...(e.target.files || [])].slice(0, 3 - primerDocs.length);
    if (!files.length || !AI) return;
    setAfErr("");
    for (const f of files) {
      const r = await AI.parseFile(f);
      setPrimerDocs((prev) => [...prev, { name: r.name, ext: r.ext, chars: r.chars, text: r.text, docType: guessDocType(r.name, r.ext), uploadedAt: Date.now() }]);
    }
    if (e.target) e.target.value = "";
  };

  const stripPT = (n) => n.replace(/^\s*PT\.?\s*/i, "").trim();
  const fmtRevenue = (raw) => {
    if (!raw) return "—";
    const n = parseFloat(String(raw).replace(/[^\d]/g, ""));
    if (!n || isNaN(n)) return String(raw);
    if (n >= 1e12) return "Rp " + (n / 1e12).toFixed(2).replace(".", ",") + " T";
    if (n >= 1e9) return "Rp " + (n / 1e9).toFixed(1).replace(".", ",") + " M";
    if (n >= 1e6) return "Rp " + (n / 1e6).toFixed(1).replace(".", ",") + " Jt";
    return "Rp " + n.toLocaleString("id-ID");
  };
  const initials = (stripPT(company).slice(0, 3) || "XXX").toUpperCase();
  const caseId = `Case-${String(nextIndex).padStart(3, "0")}-${initials}`;
  const [caseName, setCaseName] = React.useState("");

  React.useEffect(refreshIcons);

  const logoRef = React.useRef(null);
  const onLogoPick = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => setForm((prev) => ({ ...prev, logo: r.result }));
    r.readAsDataURL(f);
  };

  const runAutofill = async () => {
    if (!AI || !AI.hasKey()) { setAfErr("API Key Anthropic belum diatur. Buka Pengaturan → API Key."); return; }
    const ctx = window.STX_AI.buildContext(primerDocs, 120000);
    if (!ctx.trim() && !form.website.trim()) { setAfErr("Unggah dokumen atau masukkan website perusahaan terlebih dahulu."); return; }
    setFilling(true); setAfErr("");
    try {
      const r = await AI.analyzePrimer({ company, contextText: ctx, website: form.website });
      setForm((f) => ({ ...f, founded: r.founded || f.founded, sector: r.sector || f.sector, bidang: r.bidang || f.bidang, revenue: r.revenue || f.revenue, revenueDate: r.revenueDate || f.revenueDate, status: r.status || f.status }));
      if (!company && r.company) setCompany(r.company);
      setAutofilled(true);
    } catch (e) {
      setAfErr("Isi otomatis gagal: " + e.message);
    } finally {
      setFilling(false);
    }
  };

  const field = (label, node, hint) => (
    <div>
      <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "var(--text-body)", marginBottom: 6 }}>{label}</label>
      {node}
      {hint && <div style={{ fontSize: 11, color: "var(--text-faint)", marginTop: 5 }}>{hint}</div>}
    </div>
  );

  if (step === 1) {
    return (
      <div style={{ maxWidth: 620, margin: "0 auto" }}>
        <Card padding="xl">
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--text-muted)" }}>Langkah 1 dari 2</div>
          <h2 style={{ fontSize: 24, marginTop: 6 }}>Buat Case Baru</h2>
          <p style={{ fontSize: 14, color: "var(--text-muted)", marginTop: 6, marginBottom: 22 }}>Indeks case dibuat otomatis dari nomor urut dan tiga huruf pertama nama perusahaan (tanpa "PT").</p>

          <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
            {field("Nama perusahaan", <Input value={company} onChange={(e) => setCompany(e.target.value)} placeholder="mis. PT Astra Sejahtera Tbk" />, "Awalan \"PT\" diabaikan saat membuat indeks.")}
            <div style={{ display: "flex", gap: 14, alignItems: "flex-end" }}>
              <div style={{ flex: 1 }}>
                {field("Indeks case (otomatis)", <Input value={caseId} disabled prefix={<Icon n="hash" s={15} />} />)}
              </div>
              <div style={{ flex: 1.4 }}>
                {field("Nama case (dapat diedit)", <Input value={caseName} onChange={(e) => setCaseName(e.target.value)} placeholder={company ? stripPT(company) : "Perusahaan"} />)}
              </div>
            </div>
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 28 }}>
            <Button variant="ghost" onClick={onCancel}>Batal</Button>
            <Button variant="primary" iconRight={<Icon n="arrow-right" s={16} />} disabled={!company.trim()} onClick={() => setStep(2)}>Lanjut ke Data Primer</Button>
          </div>
        </Card>
      </div>
    );
  }

  return (
    <div style={{ maxWidth: 760, margin: "0 auto" }}>
      <Card padding="xl">
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between" }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--text-muted)" }}>Langkah 2 dari 2</div>
            <h2 style={{ fontSize: 24, marginTop: 6 }}>Data Primer Perusahaan</h2>
          </div>
          <Badge tone="brand"><span style={{ fontFamily: "var(--font-mono)" }}>{caseId}</span></Badge>
        </div>

        {/* Auto-fill zone */}
        <div style={{ marginTop: 18, marginBottom: 20, padding: 16, borderRadius: "var(--radius-lg)", background: "var(--accent-quiet)", border: "1px solid var(--teal-400)" }}>
          <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
            <div style={{ width: 38, height: 38, borderRadius: 10, background: "var(--grad-blade)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon n="sparkles" s={19} /></div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 700, color: "var(--text-strong)", fontSize: 14 }}>Isi otomatis dengan AI</div>
              <div style={{ fontSize: 12.5, color: "var(--text-body)", marginTop: 2 }}>Unggah hingga 3 dokumen atau masukkan website — AI akan mengisi Data Primer. Anda tetap dapat mengedit sebelum menyimpan.</div>
              <div style={{ display: "flex", gap: 10, marginTop: 12, flexWrap: "wrap" }}>
                <div style={{ flex: 1, minWidth: 200 }}><Input value={form.website} onChange={(e) => setForm({ ...form, website: e.target.value })} prefix={<Icon n="globe" s={15} />} placeholder="website perusahaan" /></div>
                <input ref={primerFileRef} type="file" accept=".pdf,.xlsx,.xls,.csv,.docx,.txt" multiple style={{ display: "none" }} onChange={onPrimerDocs} />
                <Button variant="secondary" iconLeft={<Icon n="upload" s={15} />} disabled={primerDocs.length >= 3} onClick={() => primerFileRef.current && primerFileRef.current.click()}>Unggah ({primerDocs.length}/3)</Button>
                <Button variant="accent" loading={filling} iconLeft={filling ? null : <Icon n="wand-2" s={15} />} onClick={runAutofill}>{filling ? "Membaca…" : "Isi otomatis"}</Button>
              </div>
              {primerDocs.length > 0 && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
                  {primerDocs.map((d, i) => (
                    <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, color: "var(--text-body)", background: "var(--surface)", border: "1px solid var(--border)", padding: "4px 8px", borderRadius: "var(--radius-sm)" }}>
                      <Icon n="file-text" s={13} />{d.name}
                      <button onClick={() => setPrimerDocs((p) => p.filter((_, j) => j !== i))} style={{ border: "none", background: "transparent", cursor: "pointer", color: "var(--text-faint)", display: "inline-flex", padding: 0 }}><Icon n="x" s={12} /></button>
                    </span>
                  ))}
                </div>
              )}
              {afErr && <div style={{ fontSize: 12, color: "var(--negative-600)", marginTop: 10, display: "flex", gap: 6, alignItems: "flex-start" }}><Icon n="alert-circle" s={13} /> {afErr}</div>}
            </div>
          </div>
        </div>

        {autofilled && <div style={{ marginBottom: 18 }}><Alert tone="positive" title="Data Primer terisi otomatis">Tinjau dan sesuaikan sebelum menyimpan.</Alert></div>}

        {/* Logo perusahaan */}
        <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 18, padding: 14, border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", background: "var(--surface-sunken)" }}>
          {form.logo
            ? <img src={form.logo} alt="logo" style={{ width: 56, height: 56, borderRadius: 12, objectFit: "contain", background: "#fff", border: "1px solid var(--border)", padding: 4, flexShrink: 0 }} />
            : <CompanyMark initials={initials} color="#0E7C8B" size={56} radius={12} />}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "var(--text-strong)" }}>Logo perusahaan</div>
            <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 2, lineHeight: 1.5 }}>Kosongkan agar AI mengenali logo otomatis dari website atau dokumen. Kini menampilkan inisial <strong>{initials}</strong>.</div>
          </div>
          <input ref={logoRef} type="file" accept="image/*" style={{ display: "none" }} onChange={onLogoPick} />
          {form.logo && <Button variant="ghost" size="sm" onClick={() => setForm({ ...form, logo: null })}>Hapus</Button>}
          <Button variant="secondary" size="sm" iconLeft={<Icon n="upload" s={15} />} onClick={() => logoRef.current && logoRef.current.click()}>Unggah logo</Button>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "minmax(0, 1fr) minmax(0, 1fr)", gap: 16 }}>
          {field("Nama perusahaan", <Input value={company} onChange={(e) => setForm && setCompany(e.target.value)} />)}
          {field("Tahun berdiri", <Input value={form.founded} onChange={(e) => setForm({ ...form, founded: e.target.value })} placeholder="mis. 1994" />)}
          {field("Sektor Industri (BI)", <Select value={form.sector} onChange={(e) => setForm({ ...form, sector: e.target.value })} placeholder="Pilih sektor (klasifikasi BI)" options={(window.STX_DATA.sectorsBI || []).concat(form.sector && !(window.STX_DATA.sectorsBI || []).includes(form.sector) ? [form.sector] : [])} />)}
          {field("Bidang usaha", <Select value={form.bidang} onChange={(e) => setForm({ ...form, bidang: e.target.value })} placeholder="Pilih bidang usaha" options={(window.STX_DATA.bidangUsaha || []).concat(form.bidang && !(window.STX_DATA.bidangUsaha || []).includes(form.bidang) ? [form.bidang] : [])} />)}
          {field("Revenue tahunan", <Input value={form.revenue} onChange={(e) => setForm({ ...form, revenue: e.target.value })} prefix="Rp" placeholder="4.820.000.000.000" />)}
          {field("Per bulan / tahun", <Input type="month" value={form.revenueDate} onChange={(e) => setForm({ ...form, revenueDate: e.target.value })} />, "Periode acuan angka revenue.")}
          <div style={{ gridColumn: "1 / -1" }}>
            {field("Status perusahaan", <Select value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })} placeholder="Pilih status" options={["BUMN", "Multinasional", "Swasta Nasional", "SME", "UMKM"]} />)}
          </div>
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 26 }}>
          <Button variant="ghost" iconLeft={<Icon n="arrow-left" s={16} />} onClick={() => setStep(1)}>Kembali</Button>
          <Button variant="primary" iconLeft={<Icon n="check" s={16} />} onClick={() => onCreate({ id: caseId, name: caseName || (company + " — Due Diligence"), company, initials, logoColor: "#0E7C8B", logo: form.logo || null, sector: form.sector || "—", bidang: form.bidang || "", status: form.status || "—", founded: form.founded, website: form.website || "", revenue: fmtRevenue(form.revenue), revenueDate: form.revenueDate, docText: primerDocs, updated: "baru saja", agents: [], analysis: {}, health: "Sehat" })}>Simpan Data Primer</Button>
        </div>
      </Card>
    </div>
  );
}

Object.assign(window, { CaseLibrary, NewCaseFlow });

</script>
<script type="text/babel" data-file="workspace.jsx">
/* global React, Icon, refreshIcons, CompanyMark, SectionTitle */
const WsNS = window.STRATIXDesignSystem_72cbdd;

const DOC_TYPES = ["Laporan Keuangan/Tahunan", "Presentasi Perusahaan", "Artikel Berita/Media", "Dokumen Lainnya"];
function guessDocType(name, ext) {
  const n = (name || "").toLowerCase(), e = (ext || "").toLowerCase();
  if (/present|paparan|deck|slide|\bppt\b/.test(n) || e === "pptx" || e === "ppt") return "Presentasi Perusahaan";
  if (/berita|news|artikel|media|press|siaran|rilis|koran/.test(n)) return "Artikel Berita/Media";
  if (e === "pdf" || e === "xlsx" || e === "xls" || e === "csv") return "Laporan Keuangan/Tahunan";
  return "Dokumen Lainnya";
}
function CaseWorkspace({ caseCtx, docs, agents, onRunAgent, dirty, jobs, onStartJob, onClearJob, onMarkDirty, onSave, onRequestClose }) {
  const { Card, Badge, Button, Alert, Tag, ProgressBar, Input, Textarea, Select, Dialog } = WsNS;
  const [err, setErr] = React.useState("");
  const [parsing, setParsing] = React.useState(false);
  const docFileRef = React.useRef(null);
  const [, force] = React.useReducer((x) => x + 1, 0);
  const mark = () => { onMarkDirty && onMarkDirty(); };
  const AI = window.STX_AI;
  const uploaded = caseCtx.docText || [];
  const onDocs = async (e) => {
    const files = [...(e.target.files || [])];
    if (!files.length || !AI) return;
    setParsing(true); setErr("");
    caseCtx.docText = caseCtx.docText || [];
    for (const f of files) {
      const r = await AI.parseFile(f);
      caseCtx.docText.push({ name: r.name, ext: r.ext, chars: r.chars, text: r.text, docType: guessDocType(r.name, r.ext), uploadedAt: Date.now() });
      force();
    }
    setParsing(false); mark();
    // Auto-perbarui Data Primer dari dokumen terkini (best-effort, senyap)
    if (AI.hasKey()) {
      try {
        const ctx = AI.buildContext(caseCtx.docText);
        const pr = await AI.analyzePrimer({ company: caseCtx.company, contextText: ctx, website: caseCtx.website });
        if (pr) {
          caseCtx.founded = pr.founded || caseCtx.founded;
          caseCtx.sector = pr.sector || caseCtx.sector;
          caseCtx.bidang = pr.bidang || caseCtx.bidang;
          caseCtx.revenue = pr.revenue || caseCtx.revenue;
          caseCtx.revenueDate = pr.revenueDate || caseCtx.revenueDate;
          caseCtx.status = pr.status || caseCtx.status;
          caseCtx.primerUpdatedAt = new Date().toLocaleString("id-ID");
          mark(); force();
        }
      } catch (e) { /* diam: auto-update opsional */ }
    }
  };
  const removeDoc = (i) => { caseCtx.docText.splice(i, 1); mark(); force(); };
  const logoRef = React.useRef(null);
  const onLogo = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => { caseCtx.logo = r.result; mark(); force(); };
    r.readAsDataURL(f);
  };

  // ---- Edit Data Primer ----
  const [editing, setEditing] = React.useState(false);
  const [ef, setEf] = React.useState({});
  const [filling, setFilling] = React.useState(false);
  const [fillErr, setFillErr] = React.useState("");
  const editLogoRef = React.useRef(null);
  const openEdit = () => {
    setEf({ company: caseCtx.company || "", founded: caseCtx.founded || "", sector: caseCtx.sector || "", bidang: caseCtx.bidang || "", status: caseCtx.status || "", revenue: caseCtx.revenue || "", revenueDate: caseCtx.revenueDate || "", website: caseCtx.website || "", logo: caseCtx.logo || null });
    setFilling(false); setFillErr(""); setEditing(true);
  };
  // Ambil revenue (Rp Miliar) + tahun terbaru dari hasil Agen Analis Keuangan
  const latestRevFromAnalysis = () => {
    const fin = (caseCtx.analysis && caseCtx.analysis.finance) || null;
    if (!fin) return null;
    const F = fin.financials || {};
    const labels = F.labels || fin.revenueLabels || [];
    const series = (F.lines && Array.isArray(F.lines.pendapatan)) ? F.lines.pendapatan
      : (Array.isArray(fin.revenueSeries) ? fin.revenueSeries.map((v) => (v == null ? null : v * 1000)) : []);
    if (!labels.length || !series.length) return null;
    for (let i = Math.min(labels.length, series.length) - 1; i >= 0; i--) {
      const v = series[i];
      if (v != null && !isNaN(v)) return { year: String(labels[i]), miliar: Number(v) };
    }
    return null;
  };
  const pullRevenue = () => {
    const r = latestRevFromAnalysis();
    if (!r) { setFillErr("Belum ada angka revenue pada analisis keuangan. Jalankan Agen Analis Keuangan terlebih dahulu."); return; }
    setFillErr("");
    const nice = "Rp " + Math.round(r.miliar).toLocaleString("id-ID") + " M";
    setEf((p) => ({ ...p, revenue: nice, revenueDate: r.year + "-12" }));
  };
  const runAiUpdate = async () => {
    if (!AI || !AI.hasKey()) { setFillErr("API Key Anthropic belum diatur. Buka Pengaturan → API Key."); return; }
    const ctx = window.STX_AI.buildContext(caseCtx.docText);
    if (!ctx.trim() && !(ef.website || "").trim()) { setFillErr("Masukkan website atau unggah dokumen pada Langkah 1 terlebih dahulu."); return; }
    setFilling(true); setFillErr("");
    try {
      const r = await AI.analyzePrimer({ company: ef.company, contextText: ctx, website: ef.website });
      setEf((p) => ({ ...p, founded: r.founded || p.founded, sector: r.sector || p.sector, bidang: r.bidang || p.bidang, revenue: r.revenue || p.revenue, revenueDate: r.revenueDate || p.revenueDate, status: r.status || p.status, company: (!p.company && r.company) ? r.company : p.company }));
    } catch (e) {
      setFillErr("Update otomatis gagal: " + e.message);
    } finally {
      setFilling(false);
    }
  };
  const onEditLogo = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => setEf((p) => ({ ...p, logo: r.result }));
    r.readAsDataURL(f);
  };
  const saveEdit = () => {
    Object.assign(caseCtx, { company: ef.company, founded: ef.founded, sector: ef.sector, bidang: ef.bidang, status: ef.status, revenue: ef.revenue, revenueDate: ef.revenueDate, website: ef.website, logo: ef.logo, updated: "baru saja" });
    setEditing(false); mark(); force();
  };
  const efield = (label, node) => (
    <div>
      <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "var(--text-body)", marginBottom: 6 }}>{label}</label>
      {node}
    </div>
  );

  React.useEffect(refreshIcons);

  const fileIcon = { pdf: "file-text", xls: "sheet", xlsx: "sheet", csv: "sheet", doc: "file-type-2", docx: "file-type-2", txt: "file-text" };
  const jobOf = (id) => (jobs || {})[caseCtx.id + ":" + id] || {};
  const startAgent = (id) => { setErr(""); onStartJob && onStartJob(caseCtx, id); };
  const thBase = { textAlign: "left", padding: "8px 10px", fontSize: 10, fontWeight: 700, letterSpacing: "0.04em", textTransform: "uppercase", color: "var(--text-muted)", background: "var(--surface)", zIndex: 1 };
  const tdBase = { padding: "8px 10px", verticalAlign: "middle" };
  const fmtUploaded = (ts) => ts ? new Date(ts).toLocaleString("id-ID", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" }) : "—";

  return (
    <div style={{ maxWidth: 1000, margin: "0 auto" }}>
      {/* Save / Close bar */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
        <div>
          {dirty

        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {dirty && <Button variant="primary" size="sm" iconLeft={<Icon n="save" s={14} />} onClick={onSave}>Simpan</Button>}
          <Button variant="secondary" size="sm" iconLeft={<Icon n="x" s={14} />} onClick={onRequestClose}>Tutup</Button>
        </div>
      </div>

      {/* Case header */}
      <Card padding="lg" style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
          <div style={{ position: "relative", flexShrink: 0 }}>
            {caseCtx.logo
              ? <img src={caseCtx.logo} alt="logo" style={{ width: 56, height: 56, borderRadius: 14, objectFit: "contain", background: "#fff", border: "1px solid var(--border)", padding: 4 }} />
              : <CompanyMark initials={caseCtx.initials} color={caseCtx.logoColor} size={56} radius={14} />}
            <input ref={logoRef} type="file" accept="image/*" style={{ display: "none" }} onChange={onLogo} />
            <button onClick={() => logoRef.current && logoRef.current.click()} title="Ganti logo" style={{ position: "absolute", right: -4, bottom: -4, width: 22, height: 22, borderRadius: 999, border: "2px solid var(--surface)", background: "var(--brand)", color: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: 0 }}><Icon n="camera" s={11} /></button>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--text-muted)" }}>{caseCtx.id}</span>
              <Badge tone="brand" size="sm">{caseCtx.status}</Badge>
            </div>
            <div style={{ fontSize: 20, fontWeight: 700, color: "var(--text-strong)", letterSpacing: "-0.01em", marginTop: 2 }}>{caseCtx.company}</div>
          </div>
          <div style={{ display: "flex", gap: 22 }}>
            {[["Sektor", caseCtx.sector], ["Berdiri", caseCtx.founded], ["Revenue", caseCtx.revenue]].map(([k, v]) => (
              <div key={k}>
                <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.06em", color: "var(--text-faint)", fontWeight: 700 }}>{k}</div>
                <div style={{ fontSize: 14, fontWeight: 600, color: "var(--text-strong)", marginTop: 3, fontFamily: k === "Revenue" || k === "Berdiri" ? "var(--font-mono)" : "inherit" }}>{v}</div>
              </div>
            ))}
          </div>
          <Button variant="secondary" size="sm" iconLeft={<Icon n="pencil" s={14} />} onClick={openEdit}>Edit Data Primer</Button>
        </div>
      </Card>

      {/* Step 1: documents */}
      <SectionTitle eyebrow="Langkah 1" title="Dokumen & Keterangan" right={<Badge tone="accent" dot>{uploaded.length ? `${uploaded.length} dokumen terunggah` : `${docs.length} contoh`}</Badge>} />
      <div style={{ display: "grid", gridTemplateColumns: "minmax(0, 1.3fr) minmax(0, 1fr)", gap: 16, marginBottom: 28 }}>
        <Card>
          {uploaded.length === 0 ? (
            <div>
              <div style={{ fontSize: 12, color: "var(--text-faint)", padding: "2px 2px 10px" }}>Belum ada dokumen diunggah. Unggah laporan keuangan, presentasi, atau artikel berita untuk dianalisis AI.</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 7, opacity: 0.55, marginBottom: 2 }}>
                {docs.slice(0, 3).map((d) => (
                  <div key={d.name} style={{ display: "flex", alignItems: "center", gap: 9, fontSize: 12, color: "var(--text-muted)" }}>
                    <Icon n={fileIcon[d.type] || "file"} s={14} /><span style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{d.name}</span>
                    <span style={{ marginLeft: "auto", fontSize: 10, fontFamily: "var(--font-mono)" }}>contoh</span>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <div style={{ maxHeight: 268, overflowY: "auto", borderRadius: "var(--radius-md)", border: "1px solid var(--border-subtle)" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12.5 }}>
                <thead>
                  <tr>
                    <th style={{ ...thBase, position: "sticky", top: 0 }}>Dokumen</th>
                    <th style={{ ...thBase, position: "sticky", top: 0 }}>Jenis</th>
                    <th style={{ ...thBase, position: "sticky", top: 0, textAlign: "right" }}>Karakter</th>
                    <th style={{ ...thBase, position: "sticky", top: 0 }}>Diunggah</th>
                    <th style={{ ...thBase, position: "sticky", top: 0 }}>Status</th>
                    <th style={{ ...thBase, position: "sticky", top: 0, width: 28 }}></th>
                  </tr>
                </thead>
                <tbody>
                  {uploaded.map((d, i) => (
                    <tr key={i} style={{ borderTop: "1px solid var(--border-subtle)" }}>
                      <td style={tdBase}><div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}><Icon n={fileIcon[d.ext] || "file"} s={15} style={{ color: "var(--accent-hover)", flexShrink: 0 }} /><span title={d.name} style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: 150, fontWeight: 600, color: "var(--text-strong)" }}>{d.name}</span></div></td>
                      <td style={tdBase}><div style={{ width: 168 }}><Select value={d.docType || "Laporan Keuangan/Tahunan"} onChange={(e) => { caseCtx.docText[i].docType = e.target.value; mark(); force(); }} options={DOC_TYPES} /></div></td>
                      <td style={{ ...tdBase, textAlign: "right", fontFamily: "var(--font-mono)", color: "var(--text-muted)", whiteSpace: "nowrap" }}>{d.chars.toLocaleString("id-ID")}</td>
                      <td style={{ ...tdBase, whiteSpace: "nowrap", color: "var(--text-muted)", fontSize: 11.5 }}>{fmtUploaded(d.uploadedAt)}</td>
                      <td style={tdBase}><Badge tone={d.chars > 40 ? "positive" : "warning"} size="sm" dot>{d.chars > 40 ? "terbaca" : "kosong"}</Badge></td>

              </table>
            </div>

            <Icon n="upload-cloud" s={17} /> {parsing ? "Memproses dokumen…" : "Unggah dokumen (PDF, Excel, Word, teks)"}
          </button>

        <Card>
          <div style={{ fontSize: 13, fontWeight: 700, color: "var(--text-strong)", marginBottom: 8 }}>Keterangan tambahan</div>
          <Textarea value={caseCtx.notes || ""} onChange={(e) => { caseCtx.notes = e.target.value; mark(); force(); }} rows={4} placeholder="mis. Fokuskan pada siklus pendapatan dan piutang; soroti transaksi pihak berelasi." />
          <div style={{ fontSize: 11, color: "var(--text-faint)", marginTop: 6 }}>Keterangan ini disertakan sebagai konteks tambahan saat agen berjalan.</div>
<div style={{ fontSize: 11, color: "var(--text-faint)", marginTop: 12 }}>Daftar dokumen ada di tabel sebelah kiri.</div>
        </Card>
      </div>

      {/* Step 2: agent selection */}
      {err && <div style={{ marginBottom: 14 }}><Alert tone="negative" title="Tidak dapat menjalankan analisis" onClose={() => setErr("")}>{err}</Alert></div>}

                  {analyzedAt ? <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11.5, color: "var(--text-muted)", marginBottom: 10 }}><Icon n="clock" s={12} /> Pembaruan terakhir: {analyzedAt}</div> : null}

                    <Icon n="refresh-cw" s={13} /> Analisis ulang
                  </button>

              ) : (
                <Button variant="primary" block iconLeft={<Icon n="play" s={15} />} onClick={() => startAgent(a.id)} style={{ marginTop: 12 }}>
                  Jalankan agen
                </Button>
              )}
              <div style={{ position: "absolute", right: -20, bottom: -20, opacity: 0.05, color: a.color }}><Icon n={a.icon} s={120} /></div>
            </Card>
          );
        })}
      </div>

      {/* Dialog Edit Data Primer */}
      <Dialog open={editing} onClose={() => setEditing(false)} title="Edit Data Primer" description={caseCtx.id} width={660}
        footer={<><Button variant="secondary" onClick={() => setEditing(false)}>Batal</Button><Button variant="primary" iconLeft={<Icon n="check" s={15} />} onClick={saveEdit}>Simpan Perubahan</Button></>}>
        <div style={{ maxHeight: "58vh", overflowY: "auto", paddingRight: 4 }}>
          {/* Perbarui via AI */}
          <div style={{ padding: 14, borderRadius: "var(--radius-md)", background: "var(--accent-quiet)", border: "1px solid var(--teal-400)", marginBottom: 16 }}>
            <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
              <div style={{ width: 34, height: 34, borderRadius: 9, background: "var(--grad-blade)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon n="sparkles" s={17} /></div>

  // Context
  if (d.context) { let y = heading("Konteks & Tesis Strategis", "Diagnosis"); para(d.context, y, 13, INK, 18); }
  // Pillars
  if (Array.isArray(d.pillars) && d.pillars.length) {
    let y = heading("Pilar Transformasi");
    const cw = (W - 2 * M - 3 * 14) / 4;
    d.pillars.slice(0, 4).forEach((p, i) => {
      const x = M + i * (cw + 14);
      doc.setFillColor(244, 247, 250); doc.roundedRect(x, y, cw, 160, 8, 8, "F");
      doc.setTextColor(14, 37, 71); doc.setFont("helvetica", "bold"); doc.setFontSize(11);
      doc.text(doc.splitTextToSize(p.name || "", cw - 24), x + 12, y + 26);
      doc.setTextColor(18, 163, 180); doc.setFont("helvetica", "normal"); doc.setFontSize(10);
      doc.text(doc.splitTextToSize(p.target || "", cw - 24), x + 12, y + 76);
    });
  }
  // Targets
  if (Array.isArray(d.targets) && d.targets.length) {
    let y = heading("Sasaran Utama per Tahun");
    d.targets.forEach((t) => {
      doc.setTextColor(18, 163, 180); doc.setFont("helvetica", "bold"); doc.setFontSize(11);
      doc.text(String(t.year || ""), M, y);
      doc.setTextColor(34, 48, 63); doc.setFont("helvetica", "normal");
      const lines = doc.splitTextToSize(String(t.target || ""), W - 2 * M - 74);
      doc.text(lines, M + 74, y); y += Math.max(17, lines.length * 15) + 7;
      doc.setDrawColor(238, 238, 238); doc.line(M, y - 7, W - M, y - 7);
    });
  }
  // Roadmap
  if (Array.isArray(d.phases) && d.phases.length) {
    let y = heading("Roadmap Fase Transformasi");
    d.phases.forEach((ph) => {
      if (y > H - 80) y = heading("Roadmap Fase Transformasi (lanjutan)");
      doc.setTextColor(14, 37, 71); doc.setFont("helvetica", "bold"); doc.setFontSize(12);
      doc.text((ph.year || "") + " \u2014 " + (ph.title || ""), M, y); y += 16;
      const inits = (ph.initiatives || []).map((it) => "\u2022 " + (it.name || "") + (it.impact_quant ? " (" + it.impact_quant + ")" : "")).join("\n") || (ph.items || []).map((x) => "\u2022 " + x).join("\n");
      y = para(inits, y, 10.5, INK, 14) + 10;
    });
  }
  // Projection P&L
  if (d.projection && Array.isArray(d.projection.pnl)) {
    let y = heading("Proyeksi Keuangan \u2014 Laba Rugi", "Rp Miliar");
    const lbl = (d.projection.labels || []).map(String);
    const cols = ["Item"].concat(lbl).concat(["CAGR"]);
    const firstColW = 150; const restW = (W - 2 * M - firstColW) / (cols.length - 1);
    const colX = (i) => i === 0 ? M + 6 : M + firstColW + (i - 1) * restW + restW - 8;
    doc.setFillColor(14, 37, 71); doc.rect(M, y - 13, W - 2 * M, 20, "F");
    doc.setTextColor(255, 255, 255); doc.setFont("helvetica", "bold"); doc.setFontSize(9);
    doc.text("Item", M + 6, y);
    cols.slice(1).forEach((c, k) => doc.text(String(c), colX(k + 1), y, { align: "right" }));
    y += 18;
    d.projection.pnl.forEach((r) => {
      doc.setFont("helvetica", "normal"); doc.setTextColor(34, 48, 63); doc.setFontSize(9.5);
      doc.text(doc.splitTextToSize(String(r.item || ""), firstColW - 10), M + 6, y);
      (r.values || []).forEach((v, k) => doc.text(v == null ? "\u2014" : Math.round(v).toLocaleString("id-ID"), colX(k + 1), y, { align: "right" }));
      doc.setTextColor(18, 163, 180); doc.text(r.cagr != null ? Number(r.cagr).toFixed(1).replace(".", ",") + "%" : "\u2014", colX(cols.length - 1), y, { align: "right" });
      y += 17; doc.setDrawColor(238, 238, 238); doc.line(M, y - 7, W - M, y - 7);
    });
  }
  // Innovation
  if (d.innovation && Array.isArray(d.innovation.ideas)) {
    let y = heading("Inovasi & Terobosan", "Benchmark \u00b7 Dampak \u00b7 Risiko");
    d.innovation.ideas.forEach((it) => {
      if (y > H - 96) y = heading("Inovasi & Terobosan (lanjutan)");
      doc.setTextColor(14, 37, 71); doc.setFont("helvetica", "bold"); doc.setFontSize(12);
      doc.text(doc.splitTextToSize(it.title || "", W - 2 * M), M, y); y += 16;
      y = para("Benchmark: " + (it.benchmark || "-"), y, 10, INK, 13);
      y = para("Dampak: " + (it.impact || "-"), y, 10, [26, 143, 90], 13);
      y = para("Risiko: " + (it.risk || "-"), y, 10, [192, 57, 43], 13) + 10;
    });
  }
  return doc.output("blob");
}

function DeckGenIndicator() {
  const [st, setSt] = React.useState(DeckGen.status);
  React.useEffect(() => { const un = DeckGen.subscribe((s) => setSt(s ? Object.assign({}, s) : null)); return un; }, []);
  React.useEffect(refreshIcons);
  React.useEffect(() => { if (st && st.state === "done") { const t = setTimeout(() => DeckGen.clear(), 12000); return () => clearTimeout(t); } }, [st && st.state]);
  if (!st) return null;
  const running = st.state === "running", error = st.state === "error";
  return (
    <div style={{ position: "fixed", right: 20, bottom: 20, zIndex: 95, display: "flex", alignItems: "center", gap: 11, background: "var(--surface)", border: "1px solid var(--border)", borderLeft: "3px solid " + (error ? "var(--negative-500)" : running ? "var(--accent)" : "var(--positive-500)"), borderRadius: "var(--radius-lg)", boxShadow: "var(--shadow-lg)", padding: "12px 14px", maxWidth: 340 }}>
      <div style={{ width: 30, height: 30, borderRadius: 8, flexShrink: 0, background: "var(--bg-subtle)", color: error ? "var(--negative-600)" : running ? "var(--accent-hover)" : "var(--positive-600)", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <Icon n={error ? "alert-triangle" : running ? "loader" : "check-circle-2"} s={16} />
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 12.5, fontWeight: 700, color: "var(--text-strong)" }}>{running ? "Membuat pitch deck…" : error ? "Gagal membuat pitch deck" : "Pitch deck siap"}</div>
        <div style={{ fontSize: 11, color: "var(--text-muted)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{error ? st.error : st.filename}</div>
      </div>
      {!running && st.state === "done" && st.meta ? <button onClick={() => downloadDeck(st.meta)} title="Unduh" style={{ border: "none", background: "var(--accent)", color: "#fff", borderRadius: 7, height: 30, padding: "0 10px", fontSize: 12, fontWeight: 700, cursor: "pointer", flexShrink: 0 }}>Unduh</button> : null}

    </div>
  );
}

function stxReportShell(title, bodyHtml) {
  return `<!DOCTYPE html><html lang="id"><head><meta charset="utf-8"><title>${title}</title>
  <style>
    *{box-sizing:border-box;}
    body{font-family:'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif;color:#22303F;margin:0;padding:32px 38px;font-size:12.5px;line-height:1.5;}
    h1,h2,h3{color:#0E2547;margin:0;}
    .stx-h2{font-size:15px;color:#0E2547;border-bottom:2px solid #12A3B4;padding-bottom:5px;margin:24px 0 12px;page-break-after:avoid;}
    table{border-collapse:collapse;width:100%;}
    .mono{font-family:'IBM Plex Mono','Courier New',monospace;}
    .card{border:1px solid #E2E8F0;border-radius:8px;padding:11px 13px;margin-bottom:10px;page-break-inside:avoid;}
    @page{size:A4;margin:14mm 12mm;}
    @media print{body{padding:0;}}
  </style></head><body>${bodyHtml}</body></html>`;
}
function openReportPreview(title, bodyHtml) {
  const prev = document.getElementById("stx-report-preview");
  if (prev) prev.remove();
  const wrap = document.createElement("div");
  wrap.id = "stx-report-preview";
  wrap.style.cssText = "position:fixed;inset:0;z-index:100000;background:rgba(8,15,30,.55);display:flex;flex-direction:column;align-items:center;padding:24px;";
  const panel = document.createElement("div");
  panel.style.cssText = "background:#fff;border-radius:14px;box-shadow:0 24px 70px rgba(0,0,0,.4);width:min(920px,96vw);height:100%;display:flex;flex-direction:column;overflow:hidden;";
  const bar = document.createElement("div");
  bar.style.cssText = "display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-bottom:1px solid #E2E8F0;background:#F8FAFC;flex-shrink:0;";
  bar.innerHTML = `<div style="font-size:13px;font-weight:700;color:#0E2547;">Pratinjau — ${title}</div>`;
  const btns = document.createElement("div"); btns.style.cssText = "display:flex;gap:8px;";
  const printBtn = document.createElement("button");
  printBtn.textContent = "Cetak / Simpan PDF";
  printBtn.style.cssText = "border:none;background:#0E2547;color:#fff;font-weight:700;font-size:12.5px;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:inherit;";
  const closeBtn = document.createElement("button");
  closeBtn.textContent = "Tutup";
  closeBtn.style.cssText = "border:1px solid #CBD5E1;background:#fff;color:#334155;font-weight:600;font-size:12.5px;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:inherit;";
  btns.appendChild(printBtn); btns.appendChild(closeBtn); bar.appendChild(btns);
  const frame = document.createElement("iframe");
  frame.style.cssText = "flex:1;width:100%;border:none;background:#fff;";
  frame.srcdoc = stxReportShell(title, bodyHtml);
  panel.appendChild(bar); panel.appendChild(frame); wrap.appendChild(panel); document.body.appendChild(wrap);
  const close = () => wrap.remove();
  closeBtn.onclick = close;
  wrap.onclick = (e) => { if (e.target === wrap) close(); };
  printBtn.onclick = () => { try { frame.contentWindow.focus(); frame.contentWindow.print(); } catch (_) { window.print(); } };
}

        ${d.recommendation ? `<br><b>Rekomendasi:</b> ${esc(d.recommendation)}` : ""}
