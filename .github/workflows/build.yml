# Build + terbitkan STRATIX Console ke GitHub Releases (auto-update).
# OTOMATIS: setiap kali Anda push ke 'main' (Commit lalu Push di GitHub Desktop),
# build berjalan sendiri DAN rilis langsung terbit — tanpa buka tab Actions,
# tanpa klik Publish. Aplikasi terinstal menawarkan pembaruan saat berikutnya dibuka.
# (Tombol "Run workflow" manual tetap tersedia sebagai cadangan.)
name: release-windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build & publish release
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
